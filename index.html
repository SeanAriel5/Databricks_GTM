<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Databricks GTM — Accenture</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:       #A100FF;
      --primary-dark:  #7500C0;
      --primary-deep:  #460073;
      --primary-light: #C2A3FF;
      --primary-pale:  #F0E8FF;
      --primary-tint:  #FAF5FF;
      --black:  #080810;
      --white:  #FFFFFF;
      --surf:   #F6F3FB;
      --card:   #FFFFFF;
      --border: #EDE7F5;
      --border2:#D5CAEC;
      --t1: #0D0D14;
      --t2: #524F6A;
      --t3: #9894B0;
      --font: 'Graphik','Helvetica Neue',Arial,sans-serif;
      --r-sm: 8px; --r-md: 14px; --r-lg: 24px;
      --sh-s: 0 1px 4px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
      --sh-m: 0 4px 20px rgba(0,0,0,.09),0 2px 6px rgba(0,0,0,.04);
      --sh-p: 0 4px 22px rgba(161,0,255,.2);
      --ease: cubic-bezier(.4,0,.2,1);
      --t: .2s;
    }

    html { scroll-behavior: smooth; }
    body { font-family: var(--font); background: var(--surf); color: var(--t1); min-height: 100vh; }

    /* ── NAVBAR ── */
    .nav {
      background: rgba(255,255,255,.93);
      backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 200;
      height: 68px; padding: 0 40px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 1px 16px rgba(0,0,0,.07);
    }
    .nav-left  { display: flex; align-items: center; gap: 14px; }
    .nav-sep   { width: 1px; height: 28px; background: var(--border2); flex-shrink: 0; }
    .nav-logo-acc { height: 26px; width: auto; }
    .nav-logo-dbr { height: 21px; width: auto; opacity: .85; }
    .nav-title-wrap { display: flex; flex-direction: column; }
    .nav-title { font-size: 14px; font-weight: 700; letter-spacing: -.015em; color: var(--t1); }
    .nav-sub   { font-size: 10.5px; color: var(--t3); margin-top: 1px; }
    .nav-badge {
      background: var(--primary-pale); color: var(--primary);
      font-size: 10px; font-weight: 700; padding: 3px 10px;
      border-radius: 20px; letter-spacing: .07em; text-transform: uppercase;
    }
    .nav-right { font-size: 11.5px; color: var(--t3); }

    /* ── TABS ── */
    .tab-bar {
      background: #080810; padding: 0 40px; display: flex; gap: 0;
      overflow-x: auto; scrollbar-width: none;
      position: sticky; top: 68px; z-index: 100;
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-btn {
      background: none; border: none; cursor: pointer;
      color: rgba(255,255,255,.35);
      font-family: var(--font); font-size: 12.5px; font-weight: 500;
      padding: 14px 20px; white-space: nowrap;
      position: relative;
      transition: color var(--t) var(--ease);
      letter-spacing: .01em;
    }
    .tab-btn::after {
      content: ''; position: absolute; bottom: 0; left: 20px; right: 20px;
      height: 2px; background: var(--primary);
      transform: scaleX(0); transition: transform .25s var(--ease);
      border-radius: 2px 2px 0 0;
    }
    .tab-btn:hover  { color: rgba(255,255,255,.75); }
    .tab-btn.active { color: #fff; font-weight: 600; }
    .tab-btn.active::after { transform: scaleX(1); }

    /* ── LAYOUT ── */
    .main { max-width: 1200px; margin: 0 auto; padding: 28px 40px 72px; }

    /* ── IMAGE BANNER ── */
    .img-banner {
      width: 100%; margin-bottom: 24px;
      border-radius: var(--r-md); overflow: hidden;
      background: #fff; box-shadow: var(--sh-m);
      border: 1px solid var(--border);
      max-height: 420px;
      display: flex; align-items: center; justify-content: center;
    }
    .img-banner img { width: 100%; max-height: 420px; object-fit: contain; }

    /* ── STATS ── */
    .stats-strip { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; margin-bottom: 20px; }
    .stat-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r-md); padding: 20px 24px;
      box-shadow: var(--sh-s);
      transition: box-shadow var(--t) var(--ease), transform var(--t) var(--ease);
    }
    .stat-card:hover { box-shadow: var(--sh-m); transform: translateY(-2px); }
    .stat-num {
      font-size: 36px; font-weight: 700; line-height: 1; letter-spacing: -.03em;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; display: block;
    }
    .stat-label { font-size: 11px; color: var(--t3); margin-top: 6px; display: block; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; }

    /* ── FILTER BAR ── */
    .filter-bar {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r-md); padding: 16px 20px; margin-bottom: 20px;
      box-shadow: var(--sh-s); display: flex; flex-direction: column; gap: 14px;
    }
    .search-wrap {
      display: flex; align-items: center; gap: 10px;
      background: var(--surf); border: 1.5px solid var(--border2);
      border-radius: 50px; padding: 9px 16px; max-width: 380px;
      transition: border-color var(--t) var(--ease), box-shadow var(--t) var(--ease);
    }
    .search-wrap:focus-within { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(161,0,255,.1); }
    .search-wrap input {
      border: none; background: none; outline: none;
      font-family: var(--font); font-size: 13px; color: var(--t1); width: 100%;
    }
    .search-icon { color: var(--t3); display: flex; flex-shrink: 0; }

    /* ── PILLS ── */
    .pills { display: flex; flex-wrap: wrap; gap: 7px; }
    .pill {
      border: 1.5px solid var(--border2); background: var(--card); color: var(--t2);
      font-family: var(--font); font-size: 11.5px; font-weight: 500;
      padding: 5px 13px; cursor: pointer; border-radius: 50px;
      display: inline-flex; align-items: center; gap: 5px;
      transition: all var(--t) var(--ease);
    }
    .pill:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-tint); }
    .pill.active { background: var(--primary); border-color: var(--primary); color: #fff; box-shadow: var(--sh-p); }
    .pill-cnt { font-size: 10px; padding: 1px 5px; border-radius: 20px; background: rgba(0,0,0,.08); }
    .pill.active .pill-cnt { background: rgba(255,255,255,.22); }

    /* ── TABLE CONTAINER ── */
    .table-wrap {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r-md); overflow: hidden; box-shadow: var(--sh-s);
    }
    table { width: 100%; border-collapse: collapse; }
    thead tr { background: var(--black); }
    thead th {
      text-align: left; padding: 13px 20px;
      font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
      color: rgba(255,255,255,.45); white-space: nowrap;
    }

    /* expand hint */
    .expand-hint {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 20px; border-bottom: 1px solid var(--border);
      background: linear-gradient(90deg, var(--primary-tint), var(--card));
      font-size: 12px; color: var(--primary); font-weight: 500; font-style: italic;
    }

    /* data rows */
    tbody tr.data-row {
      border-bottom: 1px solid var(--border); cursor: pointer;
      transition: background-color var(--t) var(--ease);
    }
    tbody tr.data-row:last-of-type { border-bottom: none; }
    tbody tr.data-row:hover   { background: var(--primary-tint); }
    tbody tr.data-row.exp-row { background: var(--primary-pale); }
    tbody tr.data-row:hover td:first-child,
    tbody tr.data-row.exp-row td:first-child { box-shadow: inset 4px 0 0 var(--primary); }

    td { padding: 14px 20px; font-size: 13px; color: var(--t1); vertical-align: middle; }
    .td-cat {
      font-size: 10px; font-weight: 700; color: var(--primary);
      text-transform: uppercase; letter-spacing: .08em; white-space: nowrap;
    }
    .cell-main  { display: flex; flex-direction: column; gap: 4px; }
    .cell-name-text { font-weight: 600; font-size: 13.5px; }
    .cell-preview {
      font-size: 12px; color: var(--t3); line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden;
    }
    .td-date { color: var(--t3); font-size: 12px; white-space: nowrap; }
    .td-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .tag {
      background: var(--surf); color: var(--t3); font-size: 10.5px;
      padding: 2px 8px; border-radius: 6px; white-space: nowrap;
      border: 1px solid var(--border);
    }

    /* expand pill button */
    .exp-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--surf); color: var(--t2);
      font-family: var(--font); font-size: 11px; font-weight: 600;
      padding: 6px 14px; border: 1.5px solid var(--border2);
      border-radius: 50px; cursor: pointer;
      transition: all var(--t) var(--ease); white-space: nowrap;
    }
    .exp-btn:hover   { background: var(--primary); border-color: var(--primary); color: #fff; box-shadow: var(--sh-p); }
    .exp-row .exp-btn{ background: var(--primary); border-color: var(--primary); color: #fff; box-shadow: var(--sh-p); }
    .chev { display: inline-block; transition: transform .25s var(--ease); }
    .chev.open { transform: rotate(180deg); }

    /* ── EXPANDED PANEL ── */
    .exp-panel-row td { padding: 0; border: none; border-bottom: 1px solid var(--border); }
    .exp-panel {
      padding: 24px 32px 24px 40px;
      border-left: 4px solid var(--primary);
      background: linear-gradient(160deg, var(--primary-tint) 0%, var(--card) 60%);
      animation: fadeSlide .22s var(--ease) forwards;
    }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .exp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px 48px; margin-bottom: 20px; }
    .exp-full  { grid-column: 1 / -1; }
    .f-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--t3); margin-bottom: 5px; }
    .f-val { font-size: 13.5px; color: var(--t1); line-height: 1.7; }
    .f-val.desc { font-size: 15px; color: #180F24; line-height: 1.75; }

    .btn-nlm {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--primary); color: #fff;
      font-family: var(--font); font-size: 12.5px; font-weight: 600;
      padding: 10px 22px; text-decoration: none; border: none; cursor: pointer;
      border-radius: 50px; box-shadow: var(--sh-p);
      transition: all var(--t) var(--ease);
    }
    .btn-nlm:hover { background: var(--primary-dark); box-shadow: 0 6px 30px rgba(161,0,255,.35); transform: translateY(-1px); }

    /* ── USE CASES ── */
    .uc-section { margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
    .uc-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--t3); margin-bottom: 10px; }
    .uc-cards { display: flex; gap: 10px; flex-wrap: wrap; }
    .uc-card {
      border: 1.5px solid var(--border); padding: 12px 16px;
      flex: 1; min-width: 180px; max-width: 280px; border-radius: var(--r-sm);
      background: #fff; transition: all var(--t) var(--ease); cursor: pointer;
    }
    .uc-card:hover { border-color: var(--primary); box-shadow: var(--sh-p); transform: translateY(-2px); }
    .uc-cat  { font-size: 9.5px; font-weight: 700; text-transform: uppercase; color: var(--primary); letter-spacing: .08em; }
    .uc-name { font-size: 12.5px; font-weight: 500; margin-top: 3px; }
    .uc-badge {
      display: inline-flex; align-items: center;
      background: var(--primary-pale); color: var(--primary);
      font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; margin-left: 8px;
    }

    /* ── SOURCES ── */
    .source-item {
      display: grid; grid-template-columns: 40px 1fr auto; align-items: center; gap: 16px;
      padding: 13px 20px; border-bottom: 1px solid var(--border);
      transition: background-color var(--t) var(--ease);
    }
    .source-item:last-child { border-bottom: none; }
    .source-item:hover { background: var(--primary-tint); }
    .source-num   { font-size: 11px; color: var(--t3); font-weight: 600; }
    .source-title { font-size: 13px; font-weight: 500; }
    .source-link {
      display: inline-flex; align-items: center; gap: 5px;
      color: var(--primary); font-size: 11.5px; font-weight: 600;
      text-decoration: none; padding: 4px 12px;
      border: 1.5px solid var(--primary); border-radius: 50px;
      transition: all var(--t) var(--ease); white-space: nowrap;
    }
    .source-link:hover { background: var(--primary); color: #fff; box-shadow: var(--sh-p); }

    /* ── EMPTY ── */
    .empty-state { text-align: center; padding: 64px 40px; }
    .empty-title { font-size: 16px; font-weight: 600; color: var(--t1); margin-bottom: 6px; }
    .empty-body  { font-size: 13px; color: var(--t3); }

    /* ── SOURCE REPO ── */
    .src-toolbar {
      padding: 18px 20px 0; background: var(--card);
      border-bottom: 1px solid var(--border);
    }
    .src-toolbar-top {
      display: flex; align-items: center; justify-content: space-between; gap: 14px; margin-bottom: 14px;
    }
    .src-count { font-size: 12px; color: var(--t3); font-weight: 500; white-space: nowrap; }
    .view-toggle {
      display: inline-flex; border: 1.5px solid var(--border2); border-radius: 50px; overflow: hidden; flex-shrink: 0;
    }
    .view-toggle-btn {
      background: none; border: none; cursor: pointer; font-family: var(--font);
      font-size: 11.5px; font-weight: 600; color: var(--t3); padding: 6px 18px;
      transition: all var(--t) var(--ease);
    }
    .view-toggle-btn.active { background: var(--primary); color: #fff; }
    .src-filters { display: flex; flex-direction: column; gap: 10px; padding-bottom: 16px; }
    .filter-row  { display: flex; align-items: flex-start; gap: 10px; flex-wrap: wrap; }
    .filter-row-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em;
      color: var(--t3); padding: 5px 0; white-space: nowrap; min-width: 40px; flex-shrink: 0;
    }

    /* source cards */
    .src-card-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px; padding: 24px;
    }
    .src-card {
      background: var(--card); border: 1.5px solid var(--border); border-radius: var(--r-md);
      padding: 18px 20px; cursor: pointer; display: flex; flex-direction: column; gap: 11px;
      position: relative; overflow: hidden;
      transition: all var(--t) var(--ease);
    }
    .src-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: var(--primary); transform: scaleX(0); transform-origin: left;
      transition: transform .25s var(--ease);
    }
    .src-card:hover { border-color: var(--primary-light); box-shadow: var(--sh-m); transform: translateY(-2px); }
    .src-card:hover::before { transform: scaleX(1); }
    .src-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    .src-type-badge {
      font-size: 9.5px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase;
      padding: 3px 9px; border-radius: 20px; white-space: nowrap; flex-shrink: 0;
      background: var(--primary-pale); color: var(--primary); border: 1px solid var(--primary-light);
    }
    .src-card-num { font-size: 10.5px; color: var(--t3); font-weight: 600; }
    .src-card-title {
      font-size: 13.5px; font-weight: 600; color: var(--t1); line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }
    .src-publisher { font-size: 11px; color: var(--t3); font-weight: 500; }
    .src-card-topics { display: flex; flex-wrap: wrap; gap: 5px; margin-top: auto; }

    /* modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(13,13,20,.55);
      z-index: 900; display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      animation: fadeIn .18s var(--ease);
    }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    .modal-box {
      background: var(--card); border-radius: var(--r-lg);
      max-width: 660px; width: calc(100% - 40px); max-height: 82vh;
      overflow-y: auto; box-shadow: 0 24px 80px rgba(0,0,0,.36);
      animation: slideUp .22s var(--ease);
    }
    @keyframes slideUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    .modal-header {
      display: flex; align-items: flex-start; justify-content: space-between; gap: 16px;
      padding: 26px 28px 20px; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: var(--card); z-index: 2;
    }
    .modal-title { font-size: 16px; font-weight: 700; color: var(--t1); line-height: 1.45; flex: 1; }
    .modal-close {
      background: var(--surf); border: 1.5px solid var(--border2); border-radius: 50%;
      width: 32px; height: 32px; flex-shrink: 0; cursor: pointer;
      display: flex; align-items: center; justify-content: center; color: var(--t2);
      transition: all var(--t) var(--ease);
    }
    .modal-close:hover { background: var(--primary); color: #fff; border-color: var(--primary); }
    .modal-body { padding: 22px 28px 28px; display: flex; flex-direction: column; gap: 20px; }
    .modal-meta { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }
    .modal-sec-lbl {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .1em; color: var(--t3); margin-bottom: 7px;
    }
    .modal-text  { font-size: 14px; color: var(--t1); line-height: 1.75; }
    .modal-empty { font-size: 13px; color: var(--t3); font-style: italic; }
    .modal-footer { padding: 0 28px 26px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .main { padding: 20px 16px 48px; }
      .nav, .tab-bar { padding-left: 16px; padding-right: 16px; }
      .stats-strip { grid-template-columns: 1fr 1fr; }
      .exp-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 600px) {
      .stats-strip { grid-template-columns: 1fr; }
    }

    :root {
      --primary:          #A100FF;
      --primary-dark:     #7500C0;
      --primary-darkest:  #460073;
      --primary-light:    #C2A3FF;
      --primary-lightest: #E6DCFF;
      --black:  #000000;
      --white:  #FFFFFF;
      --gray-50:  #F1F1EF;
      --gray-100: #E8E8E6;
      --gray-300: #CFCFCF;
      --gray-500: #818180;
      --font: 'Graphik', 'Helvetica Neue', Arial, sans-serif;
    }

    html { scroll-behavior: smooth; }
    body { font-family: var(--font); background: var(--gray-50); color: var(--black); min-height: 100vh; }

    /* ── NAVBAR ── */
    .nav {
      background: var(--white);
      border-bottom: 1px solid var(--gray-300);
      position: sticky; top: 0; z-index: 200;
      height: 64px; padding: 0 40px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-left  { display: flex; align-items: center; gap: 20px; }
    .nav-logo  { height: 30px; width: auto; }
    .nav-sep   { width: 1px; height: 24px; background: var(--gray-300); }
    .nav-title { font-size: 15px; font-weight: 600; }
    .nav-sub   { font-size: 11px; color: var(--gray-500); margin-top: 2px; }
    .nav-date  { font-size: 12px; color: var(--gray-500); }

    /* ── TABS ── */
    .tab-bar {
      background: var(--black);
      padding: 0 40px;
      display: flex; gap: 0;
      overflow-x: auto; scrollbar-width: none;
      position: sticky; top: 64px; z-index: 100;
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-btn {
      background: none; border: none; cursor: pointer;
      color: rgba(255,255,255,0.45);
      font-family: var(--font); font-size: 13px; font-weight: 500;
      padding: 15px 22px; white-space: nowrap;
      border-bottom: 2px solid transparent;
      transition: color 150ms ease, border-color 150ms ease;
    }
    .tab-btn:hover  { color: rgba(255,255,255,0.80); }
    .tab-btn.active { color: var(--white); border-bottom-color: var(--primary); }

    /* ── LAYOUT ── */
    .main { max-width: 1200px; margin: 0 auto; padding: 28px 40px 60px; }

    /* ── IMAGE BANNER ── */
    .img-banner {
      width: 100%; margin-bottom: 20px;
      background: var(--white); border: 1px solid var(--gray-300);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; max-height: 260px;
    }
    .img-banner img { width: 100%; max-height: 260px; object-fit: contain; }

    /* ── STATS STRIP ── */
    .stats-strip {
      display: flex; background: var(--white);
      border: 1px solid var(--gray-300); margin-bottom: 16px;
    }
    .stat-item {

    /* ═══════════════════════════════════════════════
       SOURCE REPO — HELPERS
    ═══════════════════════════════════════════════ */
    const inferType = title => {
      const t = title.toLowerCase();
      if (/e-?book|ebook/.test(t))                                              return 'E-book';
      if (/\breport\b|state of\b|survey|annual\b|index\b/.test(t))             return 'Report';
      if (/\bpaper\b|research\b|whitepaper/.test(t))                           return 'Paper';
      if (/\bguide\b|how.?to|tutorial|questions to prepare|comprehensive|cheat sheet/.test(t)) return 'Guide';
      if (/\bblog\b/.test(t))                                                   return 'Blog';
      if (/\bdoc(umentation)?\b/.test(t))                                       return 'Docs';
      if (/podcast|webinar|video/.test(t))                                      return 'Media';
      return 'Article';
    };

    const inferTopics = title => {
      const t = title.toLowerCase();
      const topics = [];
      if (/\bai\b|artificial intell|machine learn|llm\b|gpt|genai|generative|agentic|agent\b/.test(t)) topics.push('AI & ML');
      if (/data engineer|medallion|delta lake|lakehouse|etl\b|pipeline|apache spark|unity catalog/.test(t)) topics.push('Data Engineering');
      if (/analytic|bi\b|business intelligence|visualization|reporting/.test(t)) topics.push('Analytics');
      if (/cloud|aws\b|azure|google cloud|gcp\b/.test(t))                      topics.push('Cloud');
      if (/partner|ecosystem|alliance|isv\b/.test(t))                          topics.push('Partnership');
      if (/certif/.test(t))                                                     topics.push('Certification');
      if (/financial|banking|insurance|fintech|capital market/.test(t))        topics.push('Financial Services');
      if (/securi|governance|compliance|privacy|regulat/.test(t))              topics.push('Governance');
      if (/accenture/.test(t))                                                  topics.push('Accenture');
      if (!topics.length) topics.push('General');
      return [...new Set(topics)];
    };

    const parsePublisher = title => {
      const match = title.match(/\s+[-|]\s+([^-|]+)$/);
      return match ? match[1].trim() : '';
    };

    const parseCleanTitle = title => {
      return title.replace(/\s+[-|]\s+[^-|]+$/, '').trim() || title;
    };

    /* ═══════════════════════════════════════════════
       SOURCE MODAL
    ═══════════════════════════════════════════════ */
    const SourceModal = ({ source, index, onClose }) => {
      const type       = inferType(source.title);
      const topics     = inferTopics(source.title);
      const publisher  = parsePublisher(source.title);
      const cleanTitle = parseCleanTitle(source.title);

      React.useEffect(() => {
        const fn = e => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', fn);
        return () => window.removeEventListener('keydown', fn);
      }, []);

      return (
        <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
          <div className="modal-box" role="dialog" aria-modal="true">
            <div className="modal-header">
              <div className="modal-title">{cleanTitle}</div>
              <button className="modal-close" onClick={onClose} aria-label="Close">
                <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" strokeWidth="2">
                  <path d="M1 1L10 10M10 1L1 10" strokeLinecap="round"/>
                </svg>
              </button>
            </div>
            <div className="modal-body">
              {/* Meta row */}
              <div className="modal-meta">
                <span className="src-type-badge">{type}</span>
                {publisher && <span style={{fontSize:12,color:'var(--t2)',fontWeight:500}}>{publisher}</span>}
                <span style={{fontSize:11,color:'var(--t3)'}}>#{String(index+1).padStart(2,'0')}</span>
              </div>
              {/* Topics */}

                {topics.map(tp => (
                  <span key={tp} className="tag" style={{background:'var(--primary-pale)',color:'var(--primary)',border:'none'}}>{tp}</span>
                ))}
              </div>
              {/* Description */}
              <div>
                <div className="modal-sec-lbl">Description</div>
                {source.description
                  ? <div className="modal-text">{source.description}</div>
                  : <div className="modal-empty">No description yet — add one in the Sources tab of Databricks_GTM.xlsx.</div>
                }
              </div>
              {/* Relevance */}
              <div>
                <div className="modal-sec-lbl">Relevance to Databricks GTM</div>
                {source.relevance
                  ? <div className="modal-text">{source.relevance}</div>
                  : <div className="modal-empty">No relevance note yet.</div>
                }
              </div>
            </div>
            {source.link && (
              <div className="modal-footer">
                <a href={source.link} target="_blank" rel="noopener noreferrer" className="btn-nlm">
                  Visit source&nbsp;<IcoExternal />

    /* ═══════════════════════════════════════════════
       SOURCES VIEW — academic repository
    ═══════════════════════════════════════════════ */
    const SourcesView = ({ rows, notebookLMLink }) => {
      const [view,        setView]        = useState('cards');
      const [typeFilter,  setTypeFilter]  = useState('All');
      const [topicFilter, setTopicFilter] = useState('All');
      const [search,      setSearch]      = useState('');
      const [modal,       setModal]       = useState(null);

      const annotated = useMemo(() => rows.map(r => ({
        ...r,
        _type:       inferType(r.title),
        _topics:     inferTopics(r.title),
        _publisher:  parsePublisher(r.title),
        _cleanTitle: parseCleanTitle(r.title),
      })), [rows]);

      const presentTypes  = useMemo(() => [...new Set(annotated.map(r => r._type))].sort(),               [annotated]);
      const presentTopics = useMemo(() => [...new Set(annotated.flatMap(r => r._topics))].sort(),          [annotated]);

      const filtered = useMemo(() => {
        let r = annotated;
        if (typeFilter  !== 'All') r = r.filter(row => row._type === typeFilter);
        if (topicFilter !== 'All') r = r.filter(row => row._topics.includes(topicFilter));
        if (search.trim()) r = r.filter(row => row.title.toLowerCase().includes(search.toLowerCase()));
        return r;
      }, [annotated, typeFilter, topicFilter, search]);

      if (!rows.length) return (
        <div className="empty-state">
          <div className="empty-title">No sources yet</div>
          <div className="empty-body">Add entries to the Sources tab in Databricks_GTM.xlsx.</div>
        </div>
      );

      return (
        <div>
          {/* ── Toolbar ── */}
          <div className="src-toolbar">
            <div className="src-toolbar-top">
              <div style={{display:'flex',alignItems:'center',gap:12,flex:1,minWidth:0}}>
                <div className="search-wrap" style={{maxWidth:340}}>
                  <span className="search-icon"><IcoSearch /></span>
                  <input
                    type="text" placeholder="Search sources…"
                    value={search} onChange={e => setSearch(e.target.value)}
                  />
                </div>
                <span className="src-count">{filtered.length} of {rows.length} sources</span>
              </div>
              <div className="view-toggle">
                <button className={`view-toggle-btn${view==='cards'?' active':''}`} onClick={() => setView('cards')}>Cards</button>
                <button className={`view-toggle-btn${view==='table'?' active':''}`} onClick={() => setView('table')}>Table</button>
              </div>
            </div>

            {/* Filters */}
            <div className="src-filters">
              <div className="filter-row">
                <span className="filter-row-label">Type</span>
                <div className="pills">
                  <button className={`pill${typeFilter==='All'?' active':''}`} onClick={() => setTypeFilter('All')}>
                    All <span className="pill-cnt">{annotated.length}</span>
                  </button>
                  {presentTypes.map(tp => (
                    <button key={tp} className={`pill${typeFilter===tp?' active':''}`} onClick={() => setTypeFilter(tp)}>
                      {tp} <span className="pill-cnt">{annotated.filter(r=>r._type===tp).length}</span>
                    </button>
                  ))}
                </div>
              </div>
              <div className="filter-row">
                <span className="filter-row-label">Topic</span>
                <div className="pills">
                  <button className={`pill${topicFilter==='All'?' active':''}`} onClick={() => setTopicFilter('All')}>
                    All
                  </button>
                  {presentTopics.map(tp => (
                    <button key={tp} className={`pill${topicFilter===tp?' active':''}`} onClick={() => setTopicFilter(tp)}>
                      {tp} <span className="pill-cnt">{annotated.filter(r=>r._topics.includes(tp)).length}</span>
                    </button>
                  ))}
                </div>
              </div>
            </div>
          </div>

          {/* NotebookLM banner */}
          {notebookLMLink && (
            <div style={{padding:'12px 20px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:14,background:'var(--primary-tint)'}}>
              <span style={{fontSize:13,color:'var(--t2)',fontWeight:500,flex:1}}>
                All {rows.length} sources indexed in NotebookLM for AI-powered research
              </span>
              <a href={notebookLMLink} target="_blank" rel="noopener noreferrer" className="btn-nlm" style={{fontSize:11.5,padding:'7px 16px'}}>
                <IcoNotebook />&nbsp;Open NotebookLM
              </a>
            </div>
          )}

          {/* No results */}
          {filtered.length === 0 && (
            <div className="empty-state">
              <div className="empty-title">No matches</div>
              <div className="empty-body">Try adjusting your filters or search term.</div>
            </div>
          )}

          {/* ── CARD VIEW ── */}
          {view === 'cards' && filtered.length > 0 && (
            <div className="src-card-grid">
              {filtered.map((row, i) => (
                <div key={row.id} className="src-card" onClick={() => setModal({ source: row, index: i })}>
                  <div className="src-card-top">
                    <span className="src-type-badge">{row._type}</span>
                    <span className="src-card-num">#{String(i+1).padStart(2,'0')}</span>
                  </div>
                  <div className="src-card-title">{row._cleanTitle}</div>
                  {row._publisher && <div className="src-publisher">{row._publisher}</div>}
                  <div className="src-card-topics">
                    {row._topics.map(tp => (
                      <span key={tp} className="tag" style={{background:'var(--primary-pale)',color:'var(--primary)',border:'none',fontSize:10}}>{tp}</span>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* ── TABLE VIEW ── */}
          {view === 'table' && filtered.length > 0 && (
            <div>
              {filtered.map((row, i) => (
                <div
                  key={row.id} className="source-item"
                  style={{cursor:'pointer'}}
                  onClick={() => setModal({ source: row, index: i })}

                  <span className="source-num">{String(i+1).padStart(2,'0')}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:600,fontSize:13,color:'var(--t1)'}}>{row._cleanTitle}</div>
                    {row._publisher && <div style={{fontSize:11,color:'var(--t3)',marginTop:2}}>{row._publisher}</div>}
                  </div>
                  <div style={{display:'flex',gap:5,flexShrink:0,alignItems:'center'}}>
                    <span className="src-type-badge">{row._type}</span>
                    {row._topics.slice(0,1).map(tp => (
                      <span key={tp} className="tag" style={{background:'var(--primary-pale)',color:'var(--primary)',border:'none'}}>{tp}</span>
                    ))}
                  </div>
                  {row.link && (
                    <a href={row.link} target="_blank" rel="noopener noreferrer" className="source-link" onClick={e => e.stopPropagation()}>
                      <IcoLink />&nbsp;Visit

          {/* Modal */}

            <SourceModal source={modal.source} index={modal.index} onClose={() => setModal(null)} />

    /* ═══════════════════════════════════════════════
       TAB CONTENT (orchestrator)
    ═══════════════════════════════════════════════ */
    const TabContent = ({ tab, rows, allUseCases }) => {
      const [expanded,   setExpanded]   = useState(null);
      const [search,     setSearch]     = useState('');
      const [activeCat,  setActiveCat]  = useState('All');

      const toggle = id => setExpanded(p => p===id ? null : id);

      const categories = uniq(rows, 'category');

      const counts = useMemo(() => {
        const c = { __total: rows.length };
        categories.forEach(cat => { c[cat] = rows.filter(r => r.category===cat).length; });
        return c;
      }, [rows, categories]);

      const filtered = useMemo(() => {
        let r = rows;
        if (activeCat !== 'All') r = r.filter(row => row.category === activeCat);
        if (search.trim()) r = r.filter(row => matchQ(row, search));
        return r;
      }, [rows, activeCat, search]);

      const isStandard = !['sources','gtmPipeline'].includes(tab.id);
      const isGTM      = tab.id === 'gtmPipeline';
      const isSources  = tab.id === 'sources';

      const stats = isSources ? [] : isGTM
        ? [
            { num: rows.length,                                           lbl: 'Total contacts' },
            { num: uniq(rows,'area').filter(Boolean).length,              lbl: 'Areas covered' },
            { num: uniq(rows,'affiliation').filter(a=>a&&a!=='—').length, lbl: 'Organisations' },
          ]
        : [
            { num: rows.length,        lbl: 'Total entries' },
            { num: categories.length,  lbl: 'Categories' },
            { num: allTags(rows).size, lbl: 'Unique tags' },
          ];

      return (
        <div>
          {/* Infographic banner */}
          {tab.image && (
            <div className="img-banner">
              <img src={tab.image} alt={tab.label} />
            </div>
          )}

          {/* Stats */}
          {stats.length > 0 && (
            <div className="stats-strip">
              {stats.map((s,i) => (
                <div key={i} className="stat-card">
                  <span className="stat-num">{s.num}</span>
                  <span className="stat-label">{s.lbl}</span>
                </div>
              ))}
            </div>
          )}

          {/* Filter bar */}
          {(isStandard || isGTM) && rows.length > 0 && (
            <div className="filter-bar">
              <div className="search-wrap">
                <span className="search-icon"><IcoSearch /></span>
                <input
                  type="text" placeholder="Search…"
                  value={search} onChange={e => setSearch(e.target.value)}
                />
              </div>
              {isStandard && categories.length > 1 && (
                <Pills categories={categories} active={activeCat} counts={counts} onChange={setActiveCat} />
              )}
            </div>
          )}

          {/* Table / list */}
          <div className="table-wrap">
            {isSources  && <SourcesView rows={rows} notebookLMLink={null} />}
            {isGTM      && <GTMTable rows={filtered} expandedId={expanded} onToggle={toggle} />}
            {isStandard && <StandardTable rows={filtered} expandedId={expanded} onToggle={toggle} allUseCases={allUseCases} />}
          </div>
        </div>
      );
    };

    /* ═══════════════════════════════════════════════
       APP
    ═══════════════════════════════════════════════ */
    const App = () => {
      const [activeTab, setActiveTab] = useState('sources');
      const tab = TABS.find(t => t.id === activeTab);

      const tabRows = {
        sources:              DATA.sources,
        background:           DATA.background,
        coreCapabilities:     DATA.coreCapabilities,
        partnershipEcosystem: DATA.partnershipEcosystem,
        certifications:       DATA.certifications,
        clientUseCases:       DATA.clientUseCases,
        gtmPipeline:          DATA.gtmPipeline,
      };

      const today = new Date().toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});

      return (
        <div>
          {/* Navbar */}
          <nav className="nav">
            <div className="nav-left">
              <img src="images/logo.png" alt="Accenture" className="nav-logo-acc" />
              <span className="nav-sep" />
              <img src="images/databricks-logo.png" alt="Databricks" className="nav-logo-dbr" />
              <span className="nav-sep" />
              <div className="nav-title-wrap">
                <span className="nav-title">Databricks GTM</span>
                <span className="nav-sub">Strategic Intelligence Repository</span>
              </div>
              <span className="nav-badge">Internal</span>
            </div>
            <div className="nav-right">Updated {today}</div>
          </nav>

          {/* Tab bar */}
          <div className="tab-bar" role="tablist">
            {TABS.map(t => (
              <button
                key={t.id}
                role="tab"
                aria-selected={activeTab===t.id}
                className={`tab-btn${activeTab===t.id?' active':''}`}
                onClick={() => setActiveTab(t.id)}
              >
                {t.label}
              </button>
            ))}
          </div>

          {/* Content */}
          <main className="main">
            <TabContent
              key={activeTab}
              tab={tab}
              rows={tabRows[activeTab]}
              allUseCases={DATA.clientUseCases}
            />
          </main>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
