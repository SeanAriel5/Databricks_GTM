<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Databricks GTM — Accenture</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:       #A100FF;
      --primary-dark:  #7500C0;
      --primary-deep:  #460073;
      --primary-light: #C2A3FF;
      --primary-pale:  #F0E8FF;
      --primary-tint:  #FAF5FF;
      --black:  #080810;
      --white:  #FFFFFF;
      --surf:   #F6F3FB;
      --card:   #FFFFFF;
      --border: #EDE7F5;
      --border2:#D5CAEC;
      --t1: #0D0D14;
      --t2: #524F6A;
      --t3: #9894B0;
      --font: 'Graphik','Helvetica Neue',Arial,sans-serif;
      --r-sm: 8px; --r-md: 14px; --r-lg: 24px;
      --sh-s: 0 1px 4px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
      --sh-m: 0 4px 20px rgba(0,0,0,.09),0 2px 6px rgba(0,0,0,.04);
      --sh-p: 0 4px 22px rgba(161,0,255,.2);
      --ease: cubic-bezier(.4,0,.2,1);
      --t: .2s;
    }

    html { scroll-behavior: smooth; }
    body { font-family: var(--font); background: var(--surf); color: var(--t1); min-height: 100vh; }

    /* ── NAVBAR ── */
    .nav {
      background: rgba(255,255,255,.93);
      backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 200;
      height: 68px; padding: 0 40px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 1px 16px rgba(0,0,0,.07);
    }
    .nav-left  { display: flex; align-items: center; gap: 14px; }
    .nav-sep   { width: 1px; height: 28px; background: var(--border2); flex-shrink: 0; }
    .nav-logo-acc { height: 26px; width: auto; }
    .nav-logo-dbr { height: 21px; width: auto; opacity: .85; }
    .nav-title-wrap { display: flex; flex-direction: column; }
    .nav-title { font-size: 14px; font-weight: 700; letter-spacing: -.015em; color: var(--t1); }
    .nav-sub   { font-size: 10.5px; color: var(--t3); margin-top: 1px; }
    .nav-badge {
      background: var(--primary-pale); color: var(--primary);
      font-size: 10px; font-weight: 700; padding: 3px 10px;
      border-radius: 20px; letter-spacing: .07em; text-transform: uppercase;
    }
    .nav-right { font-size: 11.5px; color: var(--t3); }

    /* ── TABS ── */
    .tab-bar {
      background: #080810; padding: 0 40px; display: flex; gap: 0;
      overflow-x: auto; scrollbar-width: none;
      position: sticky; top: 68px; z-index: 100;
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-btn {
      background: none; border: none; cursor: pointer;
      color: rgba(255,255,255,.35);
      font-family: var(--font); font-size: 12.5px; font-weight: 500;
      padding: 14px 20px; white-space: nowrap;
      position: relative;
      transition: color var(--t) var(--ease);
      letter-spacing: .01em;
    }
    .tab-btn::after {
      content: ''; position: absolute; bottom: 0; left: 20px; right: 20px;
      height: 2px; background: var(--primary);
      transform: scaleX(0); transition: transform .25s var(--ease);
      border-radius: 2px 2px 0 0;
    }
    .tab-btn:hover  { color: rgba(255,255,255,.75); }
    .tab-btn.active { color: #fff; font-weight: 600; }
    .tab-btn.active::after { transform: scaleX(1); }

    /* ── LAYOUT ── */
    .main { max-width: 1200px; margin: 0 auto; padding: 28px 40px 72px; }

    /* ── IMAGE BANNER ── */
    .img-banner {
      width: 100%; margin-bottom: 24px;
      border-radius: var(--r-lg); overflow: hidden;
      max-height: 360px;
      display: flex; align-items: center; justify-content: center;
    }
    .img-banner img { width: 100%; max-height: 360px; object-fit: contain; border-radius: var(--r-lg); }

    /* ── STATS ── */
    .stats-strip { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; margin-bottom: 20px; }
    .stat-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r-md); padding: 20px 24px;
      box-shadow: var(--sh-s);
      transition: box-shadow var(--t) var(--ease), transform var(--t) var(--ease);
    }
    .stat-card:hover { box-shadow: var(--sh-m); transform: translateY(-2px); }
    .stat-num {
      font-size: 36px; font-weight: 700; line-height: 1; letter-spacing: -.03em;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; display: block;
    }
    .stat-label { font-size: 11px; color: var(--t3); margin-top: 6px; display: block; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; }

    /* ── FILTER BAR ── */
    .filter-bar {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r-md); padding: 16px 20px; margin-bottom: 20px;
      box-shadow: var(--sh-s); display: flex; flex-direction: column; gap: 14px;
    }
    .search-wrap {
      display: flex; align-items: center; gap: 10px;
      background: var(--surf); border: 1.5px solid var(--border2);
      border-radius: 50px; padding: 9px 16px; max-width: 380px;
      transition: border-color var(--t) var(--ease), box-shadow var(--t) var(--ease);
    }
    .search-wrap:focus-within { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(161,0,255,.1); }
    .search-wrap input {
      border: none; background: none; outline: none;
      font-family: var(--font); font-size: 13px; color: var(--t1); width: 100%;
    }
    .search-icon { color: var(--t3); display: flex; flex-shrink: 0; }

    /* ── PILLS ── */
    .pills { display: flex; flex-wrap: wrap; gap: 7px; }
    .pill {
      border: 1.5px solid var(--border2); background: var(--card); color: var(--t2);
      font-family: var(--font); font-size: 11.5px; font-weight: 500;
      padding: 5px 13px; cursor: pointer; border-radius: 50px;
      display: inline-flex; align-items: center; gap: 5px;
      transition: all var(--t) var(--ease);
    }
    .pill:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-tint); }
    .pill.active { background: var(--primary); border-color: var(--primary); color: #fff; box-shadow: var(--sh-p); }
    .pill-cnt { font-size: 10px; padding: 1px 5px; border-radius: 20px; background: rgba(0,0,0,.08); }
    .pill.active .pill-cnt { background: rgba(255,255,255,.22); }

    /* ── TABLE CONTAINER ── */
    .table-wrap {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r-md); overflow: hidden; box-shadow: var(--sh-s);
    }
    table { width: 100%; border-collapse: collapse; }
    thead tr { background: var(--black); }
    thead th {
      text-align: left; padding: 13px 20px;
      font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
      color: rgba(255,255,255,.45); white-space: nowrap;
    }

    /* expand hint */
    .expand-hint {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 20px; border-bottom: 1px solid var(--border);
      background: linear-gradient(90deg, var(--primary-tint), var(--card));
      font-size: 12px; color: var(--primary); font-weight: 500; font-style: italic;
    }

    /* data rows */
    tbody tr.data-row {
      border-bottom: 1px solid var(--border); cursor: pointer;
      transition: background-color var(--t) var(--ease);
    }
    tbody tr.data-row:last-of-type { border-bottom: none; }
    tbody tr.data-row:hover   { background: var(--primary-tint); }
    tbody tr.data-row.exp-row { background: var(--primary-pale); }
    tbody tr.data-row:hover td:first-child,
    tbody tr.data-row.exp-row td:first-child { box-shadow: inset 4px 0 0 var(--primary); }

    td { padding: 14px 20px; font-size: 13px; color: var(--t1); vertical-align: middle; }
    .td-cat {
      font-size: 10px; font-weight: 700; color: var(--primary);
      text-transform: uppercase; letter-spacing: .08em; white-space: nowrap;
    }
    .cell-main  { display: flex; flex-direction: column; gap: 4px; }
    .cell-name-text { font-weight: 600; font-size: 13.5px; }
    .cell-preview {
      font-size: 12px; color: var(--t3); line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden;
    }
    .td-date { color: var(--t3); font-size: 12px; white-space: nowrap; }
    .td-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .tag {
      background: var(--surf); color: var(--t3); font-size: 10.5px;
      padding: 2px 8px; border-radius: 6px; white-space: nowrap;
      border: 1px solid var(--border);
    }

    /* expand pill button */
    .exp-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--surf); color: var(--t2);
      font-family: var(--font); font-size: 11px; font-weight: 600;
      padding: 6px 14px; border: 1.5px solid var(--border2);
      border-radius: 50px; cursor: pointer;
      transition: all var(--t) var(--ease); white-space: nowrap;
    }
    .exp-btn:hover   { background: var(--primary); border-color: var(--primary); color: #fff; box-shadow: var(--sh-p); }
    .exp-row .exp-btn{ background: var(--primary); border-color: var(--primary); color: #fff; box-shadow: var(--sh-p); }
    .chev { display: inline-block; transition: transform .25s var(--ease); }
    .chev.open { transform: rotate(180deg); }

    /* ── EXPANDED PANEL ── */
    .exp-panel-row td { padding: 0; border: none; border-bottom: 1px solid var(--border); }
    .exp-panel {
      padding: 24px 32px 24px 40px;
      border-left: 4px solid var(--primary);
      background: linear-gradient(160deg, var(--primary-tint) 0%, var(--card) 60%);
      animation: fadeSlide .22s var(--ease) forwards;
    }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .exp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px 48px; margin-bottom: 20px; }
    .exp-full  { grid-column: 1 / -1; }
    .f-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--t3); margin-bottom: 5px; }
    .f-val { font-size: 13.5px; color: var(--t1); line-height: 1.7; }
    .f-val.desc { font-size: 15px; color: #180F24; line-height: 1.75; }

    .btn-nlm {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--primary); color: #fff;
      font-family: var(--font); font-size: 12.5px; font-weight: 600;
      padding: 10px 22px; text-decoration: none; border: none; cursor: pointer;
      border-radius: 50px; box-shadow: var(--sh-p);
      transition: all var(--t) var(--ease);
    }
    .btn-nlm:hover { background: var(--primary-dark); box-shadow: 0 6px 30px rgba(161,0,255,.35); transform: translateY(-1px); }

    /* ── USE CASES ── */
    .uc-section { margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
    .uc-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--t3); margin-bottom: 10px; }
    .uc-cards { display: flex; gap: 10px; flex-wrap: wrap; }
    .uc-card {
      border: 1.5px solid var(--border); padding: 12px 16px;
      flex: 1; min-width: 180px; max-width: 280px; border-radius: var(--r-sm);
      background: #fff; transition: all var(--t) var(--ease); cursor: pointer;
    }
    .uc-card:hover { border-color: var(--primary); box-shadow: var(--sh-p); transform: translateY(-2px); }
    .uc-cat  { font-size: 9.5px; font-weight: 700; text-transform: uppercase; color: var(--primary); letter-spacing: .08em; }
    .uc-name { font-size: 12.5px; font-weight: 500; margin-top: 3px; }
    .uc-badge {
      display: inline-flex; align-items: center;
      background: var(--primary-pale); color: var(--primary);
      font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; margin-left: 8px;
    }

    /* ── SOURCES ── */
    .source-item {
      display: grid; grid-template-columns: 40px 1fr auto; align-items: center; gap: 16px;
      padding: 13px 20px; border-bottom: 1px solid var(--border);
      transition: background-color var(--t) var(--ease);
    }
    .source-item:last-child { border-bottom: none; }
    .source-item:hover { background: var(--primary-tint); }
    .source-num   { font-size: 11px; color: var(--t3); font-weight: 600; }
    .source-title { font-size: 13px; font-weight: 500; }
    .source-link {
      display: inline-flex; align-items: center; gap: 5px;
      color: var(--primary); font-size: 11.5px; font-weight: 600;
      text-decoration: none; padding: 4px 12px;
      border: 1.5px solid var(--primary); border-radius: 50px;
      transition: all var(--t) var(--ease); white-space: nowrap;
    }
    .source-link:hover { background: var(--primary); color: #fff; box-shadow: var(--sh-p); }

    /* ── EMPTY ── */
    .empty-state { text-align: center; padding: 64px 40px; }
    .empty-title { font-size: 16px; font-weight: 600; color: var(--t1); margin-bottom: 6px; }
    .empty-body  { font-size: 13px; color: var(--t3); }

    /* ── SOURCE REPO ── sidebar + results layout */
    .src-layout {
      display: flex; align-items: flex-start; gap: 20px; padding: 20px;
    }
    .src-sidebar {
      width: 230px; flex-shrink: 0; position: sticky; top: 74px;
      background: var(--card); border: 1.5px solid var(--border); border-radius: var(--r-md);
      padding: 20px; display: flex; flex-direction: column; gap: 20px;
    }
    .src-sidebar-section { display: flex; flex-direction: column; gap: 8px; }
    .src-sidebar-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em;
      color: var(--t3); padding-bottom: 2px; border-bottom: 1px solid var(--border);
    }
    .src-sidebar .search-wrap { max-width: 100%; }
    .src-sidebar .pills { flex-direction: column; gap: 3px; }
    .src-sidebar .pill  { justify-content: space-between; width: 100%; }
    .src-results { flex: 1; min-width: 0; }
    .src-results-bar {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px;
    }
    .src-count { font-size: 12px; color: var(--t3); font-weight: 500; white-space: nowrap; }
    .view-toggle {
      display: inline-flex; border: 1.5px solid var(--border2); border-radius: 50px; overflow: hidden; flex-shrink: 0;
    }
    .view-toggle-btn {
      background: none; border: none; cursor: pointer; font-family: var(--font);
      font-size: 11.5px; font-weight: 600; color: var(--t3); padding: 6px 18px;
      transition: all var(--t) var(--ease);
    }
    .view-toggle-btn.active { background: var(--primary); color: #fff; }

    /* source cards */
    .src-card-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }
    .src-card {
      background: var(--card); border: 1.5px solid var(--border); border-radius: var(--r-md);
      padding: 18px 20px; cursor: pointer; display: flex; flex-direction: column; gap: 11px;
      position: relative; overflow: hidden;
      transition: all var(--t) var(--ease);
    }
    .src-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: var(--primary); transform: scaleX(0); transform-origin: left;
      transition: transform .25s var(--ease);
    }
    .src-card:hover { border-color: var(--primary-light); box-shadow: var(--sh-m); transform: translateY(-2px); }
    .src-card:hover::before { transform: scaleX(1); }
    .src-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    .src-type-badge {
      font-size: 9.5px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase;
      padding: 3px 9px; border-radius: 20px; white-space: nowrap; flex-shrink: 0;
      background: var(--primary-pale); color: var(--primary); border: 1px solid var(--primary-light);
    }
    .src-card-num { font-size: 10.5px; color: var(--t3); font-weight: 600; }
    .src-card-title {
      font-size: 13.5px; font-weight: 600; color: var(--t1); line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }
    .src-publisher { font-size: 11px; color: var(--t3); font-weight: 500; }
    .src-card-topics { display: flex; flex-wrap: wrap; gap: 5px; }
    .src-card-visit {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 600; color: var(--t3);
      text-decoration: none; margin-top: auto; padding-top: 4px;
      transition: color var(--t) var(--ease);
      border-bottom: 1px solid transparent;
    }
    .src-card-visit:hover { color: var(--primary); border-bottom-color: var(--primary); }

    /* modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(13,13,20,.55);
      z-index: 900; display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      animation: fadeIn .18s var(--ease);
    }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    .modal-box {
      background: var(--card); border-radius: var(--r-lg);
      max-width: 660px; width: calc(100% - 40px); max-height: 82vh;
      overflow-y: auto; box-shadow: 0 24px 80px rgba(0,0,0,.36);
      animation: slideUp .22s var(--ease);
    }
    @keyframes slideUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    .modal-header {
      display: flex; align-items: flex-start; justify-content: space-between; gap: 16px;
      padding: 26px 28px 20px; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: var(--card); z-index: 2;
    }
    .modal-title { font-size: 16px; font-weight: 700; color: var(--t1); line-height: 1.45; flex: 1; }
    .modal-close {
      background: var(--surf); border: 1.5px solid var(--border2); border-radius: 50%;
      width: 32px; height: 32px; flex-shrink: 0; cursor: pointer;
      display: flex; align-items: center; justify-content: center; color: var(--t2);
      transition: all var(--t) var(--ease);
    }
    .modal-close:hover { background: var(--primary); color: #fff; border-color: var(--primary); }
    .modal-body { padding: 22px 28px 28px; display: flex; flex-direction: column; gap: 20px; }
    .modal-meta { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }
    .modal-sec-lbl {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .1em; color: var(--t3); margin-bottom: 7px;
    }
    .modal-text  { font-size: 14px; color: var(--t1); line-height: 1.75; }
    .modal-empty { font-size: 13px; color: var(--t3); font-style: italic; }
    .modal-footer { padding: 0 28px 26px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .main { padding: 20px 16px 48px; }
      .nav, .tab-bar { padding-left: 16px; padding-right: 16px; }
      .stats-strip { grid-template-columns: 1fr 1fr; }
      .exp-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 600px) {
      .stats-strip { grid-template-columns: 1fr; }
    }

    :root {
      --primary:          #A100FF;
      --primary-dark:     #7500C0;
      --primary-darkest:  #460073;
      --primary-light:    #C2A3FF;
      --primary-lightest: #E6DCFF;
      --black:  #000000;
      --white:  #FFFFFF;
      --gray-50:  #F1F1EF;
      --gray-100: #E8E8E6;
      --gray-300: #CFCFCF;
      --gray-500: #818180;
      --font: 'Graphik', 'Helvetica Neue', Arial, sans-serif;
    }

    html { scroll-behavior: smooth; }
    body { font-family: var(--font); background: var(--gray-50); color: var(--black); min-height: 100vh; }

    /* ── NAVBAR ── */
    .nav {
      background: var(--white);
      border-bottom: 1px solid var(--gray-300);
      position: sticky; top: 0; z-index: 200;
      height: 64px; padding: 0 40px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-left  { display: flex; align-items: center; gap: 20px; }
    .nav-logo  { height: 30px; width: auto; }
    .nav-sep   { width: 1px; height: 24px; background: var(--gray-300); }
    .nav-title { font-size: 15px; font-weight: 600; }
    .nav-sub   { font-size: 11px; color: var(--gray-500); margin-top: 2px; }
    .nav-date  { font-size: 12px; color: var(--gray-500); }

    /* ── TABS ── */
    .tab-bar {
      background: var(--black);
      padding: 0 40px;
      display: flex; gap: 0;
      overflow-x: auto; scrollbar-width: none;
      position: sticky; top: 64px; z-index: 100;
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-btn {
      background: none; border: none; cursor: pointer;
      color: rgba(255,255,255,0.45);
      font-family: var(--font); font-size: 13px; font-weight: 500;
      padding: 15px 22px; white-space: nowrap;
      border-bottom: 2px solid transparent;
      transition: color 150ms ease, border-color 150ms ease;
    }
    .tab-btn:hover  { color: rgba(255,255,255,0.80); }
    .tab-btn.active { color: var(--white); border-bottom-color: var(--primary); }

    .pills { display: flex; flex-wrap: wrap; gap: 6px; }

      padding: 22px 32px 22px 44px;

    .empty-state { text-align: center; padding: 56px 40px; color: var(--gray-500); }

    @media (max-width: 768px) {

    }

      // ── BACKGROUND  { id, category, name, sources, description, link, tags, lastUpdate }
      background: [
        { id:1, category:"Journey", name:"Overview", sources:"38,39,49,52,64,65", description:"Databricks was founded in 2013 by the creators of Apache Spark at UC Berkeley — Ali Ghodsi, Matei Zaharia, and five co-founders — and has evolved from a managed Spark service into the world's leading Data Intelligence Platform. The company pioneered the Data Lakehouse architecture (Delta Lake open-sourced 2019), acquired MosaicML ($1.3B, 2023) for generative AI and Tabular ($2B, 2024) for Apache Iceberg/open table format leadership. By 2026: $4.8B+ ARR at 55%+ YoY growth, $134B private valuation, 15,000+ enterprise customers including 70% of the Fortune 500, and an anticipated IPO that analysts expect to be the largest tech listing of the year. The platform has expanded from data engineering into full-stack AI: Agent Bricks (agentic AI, GA), Lakebase (PostgreSQL OLTP, GA), open-sourced Unity Catalog, and the Accenture JBG (25,000 professionals, shared P&L) — making Databricks simultaneously relevant to data engineering, ML, agentic AI, operational databases, and enterprise governance buyers in a single platform conversation.", link:"deep-dive-background-journey-overview.html", tags:"Company History,Valuation,IPO,Acquisitions,Lakehouse Architecture", lastUpdate:"5/7/2026" },
        { id:2, category:"Roadmap",     name:"Overview",                         sources:"10,38,39,46,49,52,64", description:"Databricks' product roadmap is built around three transformative pillars: (1) The full-stack Data Intelligence Platform — expanding from analytics into operational databases via Lakebase (PostgreSQL-compatible OLTP, now GA) and AI-native pipelines via Lakeflow; (2) Agentic AI leadership — with Agent Bricks GA, MLflow 3 for GenAI evaluation, and Unity AI Gateway for governance; (3) Financial scaling toward IPO — surpassing $4.8B ARR at 55%+ YoY growth and a $134B private valuation. Open standards (Delta Lake, Apache Iceberg via $2B Tabular acquisition, open-source Unity Catalog) are the strategic moat, ensuring customer data portability and differentiation from Snowflake's closed ecosystem.", link:"deep-dive-background-roadmap.html", tags:"Roadmap,Strategy,IPO,Lakebase,Agent Bricks,Open Source", lastUpdate:"5/7/2026" },
        { id:3, category:"Comparisons", name:"Core Capabilities",                sources:"47,64,65,94,116,123", description:"Head-to-head comparison of Databricks vs. Snowflake vs. Google BigQuery across 8 key capability dimensions: storage format (open Delta/Iceberg vs. proprietary), ML & model training, agentic AI platform (Agent Bricks vs. Cortex vs. Gemini), streaming, governance (Unity Catalog vs. Horizon vs. Dataplex), OLTP (Lakebase vs. none vs. none), cost model, and ecosystem openness. Databricks wins decisively for AI-native, multi-workload, and multi-cloud enterprise use cases; Snowflake retains an edge for pure SQL analytics; BigQuery is preferred for GCP-committed organizations. Key GTM angle: Databricks is the only platform that runs analytics, ML, and autonomous agents on the same governed open-format data — without data movement or separate governance layers.", link:"deep-dive-background-comparisons-capabilities.html", tags:"Competitive Intelligence,Snowflake,BigQuery,Battlecard,Comparison,GTM Positioning", lastUpdate:"5/7/2026" },
        { id:4, category:"Comparisons", name:"Partnerships",                     sources:"11,12,28,48,53,74,75,95", description:"Databricks' three-tier partner ecosystem — HyperScalers (AWS, Azure, GCP), System Integrators (led by Accenture's Joint Business Group), and Technology Partners (Kinaxis, Adobe, Arize) — creates a competitive moat that Snowflake's analytics-centric ecosystem cannot match. The 2026 Accenture JBG, the most significant SI partnership in Databricks' history, deploys 25,000 trained professionals and shared P&L accountability — making Accenture the primary delivery vehicle for Databricks at enterprise scale. Contrasting with Snowflake's reseller model, Databricks' ecosystem spans data engineering, ML, agentic AI, vertical applications, and mainframe modernization.", link:"deep-dive-background-comparisons-partnerships.html", tags:"Accenture Alliance,HyperScalers,Technology Partners,Co-Sell,GTM Ecosystem", lastUpdate:"5/7/2026" },
        { id:5, category:"Comparisons", name:"Certifications",                   sources:"6,29,67,83", description:"Databricks' structured certification ecosystem spans five credential types — Data Engineering (Associate + Professional), ML Associate, Generative AI Engineering Associate, and Associate Developer for Apache Spark — covering the full data and AI lifecycle in a way cloud-provider certs and Snowflake cannot match. Databricks certifications are cloud-neutral (valid on AWS, Azure, and GCP), production-focused (2026 exams test Unity Catalog, DLT, Agent Bricks, and LLM-as-a-judge evaluation), and mapped to specific delivery personas. Accenture's 25,000-professional training commitment makes certification headcount a measurable GTM differentiator in RFPs — enterprise clients increasingly specify certified practitioner counts as a gating criterion for SI selection. Databricks' GenAI Engineering Associate is the most in-demand new credential, with no Snowflake equivalent, directly addressing the 327% surge in agentic AI adoption.", link:"deep-dive-background-comparisons-certifications.html", tags:"Certifications,Accenture Alliance,Upskilling,Market Comparison,GTM Enablement", lastUpdate:"5/7/2026" },
        { id:6, category:"Comparisons", name:"Client Use Cases & Success Stories",sources:"4,12,19,34,63,119,120", description:"Databricks' client use case portfolio spans five primary archetypes — Agentic Reinvention, Retail & Consumer Intelligence, Healthcare & Life Sciences AI, Financial Services Intelligence, and Manufacturing & Supply Chain AI — each validated by named enterprise production deployments. The Accenture JBG's three launch proof points (Albertsons, BASF, Kyowa Kirin) cover CPG retail, industrial chemicals, and life sciences — the three verticals where Accenture and Databricks have the deepest joint delivery credibility. The 327% surge in enterprise agentic AI adoption means most target clients have watched a competitor deploy production AI and want to replicate the outcome, not explore a technology. The BCG/Anthropic research confirms data context and organizational readiness are the bottleneck — not model capability — making Databricks' governed Lakehouse the decisive platform advantage.", link:"deep-dive-background-comparisons-use-cases.html", tags:"Use Case Library,Client References,Accenture JBG,Agentic AI,GTM Patterns", lastUpdate:"5/7/2026" },
      ],

      // ── CORE CAPABILITIES  { id, category, name, sources, description, link, tags, lastUpdate, linkedUseCases }
      coreCapabilities: [
        { id:1,  category:"Data Medallion Architecture", name:"Overview",         sources:"55,64,65,73,128", description:"The Medallion Architecture is Databricks' foundational data organization pattern — structuring data into three progressive quality layers on open Delta Lake storage: Bronze (raw ingestion, exact source fidelity, managed by Lakeflow Connect), Silver (validated, deduplicated, and joined — the enterprise-wide single source of truth, quality-enforced via DLT EXPECT clauses), and Gold (aggregated, domain-specific tables consumed by BI tools, ML Feature Store, and Agent Bricks). The Lakehouse eliminates the legacy two-platform architecture (data lake + data warehouse) by combining warehouse-grade ACID reliability with lake-scale economics on open cloud storage — no data duplication, no ETL between analytics and ML, and a single Unity Catalog governance layer satisfying HIPAA, GDPR, SOX, and EU CSRD simultaneously. In 2026, the Medallion pattern extends beyond tables: ML models have Medallion states in Unity Catalog Model Registry, Agent Bricks state persists to Lakebase Gold-layer records, and ai_classify()/ai_extract() functions run natively in Silver-layer DLT pipelines — making the Medallion the unified architectural pattern for data, analytics, and AI.", link:"deep-dive-capability-medallion-architecture.html", tags:"Medallion Architecture,Bronze,Silver,Gold,Lakehouse,Data Quality,Delta Lake", lastUpdate:"5/7/2026", linkedUseCases:[] },
        { id:2,  category:"Data Medallion Architecture", name:"Delta Lake",       sources:"55,64,65,73,125,128", description:"Delta Lake is the open-source storage layer that transforms cloud object storage (S3, ADLS, GCS) into a reliable, ACID-compliant data foundation. It enables upserts (MERGE), schema evolution, time travel, and transaction logs — capabilities traditionally found only in expensive proprietary databases. As the engine beneath the Databricks Lakehouse, Delta Lake handles both batch and streaming workloads on the same table, eliminating data duplication. Key 2026 features include: Liquid Clustering (automatic file layout optimization, replacing manual partitioning), Predictive Optimization, Delta UniForm (compatibility with Apache Iceberg readers), and Change Data Feed for efficient incremental processing.", link:"deep-dive-capability-delta-lake.html", tags:"Delta Lake,ACID,Storage,Open Source,Streaming,Lakehouse", lastUpdate:"5/7/2026", linkedUseCases:[] },
        { id:3,  category:"Data Medallion Architecture", name:"Unity Catalogue",  sources:"30,68,69,73,89,120,125,130", description:"Unity Catalog is Databricks' unified governance layer for all data, analytics, and AI assets — enforcing access control at query time across tables, files, ML models, AI agents, and external connections simultaneously. Key capabilities: fine-grained row/column security, automated column-level lineage (zero manual annotation), Delta Sharing (zero-copy cross-organization data sharing), Lakehouse Federation (query external DBs without movement), AI-powered table documentation consumed by Genie, and Unity AI Gateway (MCP server governance for autonomous agents). Open-sourced in 2026, establishing it as the industry standard. Organizations with Unity Catalog in production deploy 12× more AI projects than those without it — making it the primary reason enterprise CISOs approve Databricks for sensitive workloads and regulated industries.", link:"deep-dive-capability-unity-catalog.html", tags:"Unity Catalog,Governance,Data Lineage,RBAC,Multi-Cloud,Security,Compliance", lastUpdate:"5/7/2026", linkedUseCases:[] },
        { id:4,  category:"Data Medallion Architecture", name:"Photon",           sources:"51,55,58,64,65", description:"Photon is Databricks' native C++ vectorized query engine — delivering 2–4× faster SQL performance on Delta Lake with zero code changes and ~50% compute cost reduction on identical workloads. Unlike Snowflake and BigQuery engines (SQL-only), Photon handles SQL, Spark ML, and Delta Live Tables streaming in a single engine — making it the only vectorized execution layer that works across analytics and AI pipelines simultaneously. Photon's impact intensifies at higher Medallion layers where aggregations and JOINs dominate: Gold-layer pipelines refresh dashboards in seconds rather than minutes, directly translating to fresher ML features and reduced DBU consumption. Included in Databricks Premium at no additional charge, Photon is the primary FinOps proof point in migration engagements — Intel IT cut compute costs 23% with Photon optimization.", link:"deep-dive-capability-photon.html", tags:"Photon,Performance,Vectorized,Cost Reduction,Delta Lake", lastUpdate:"5/7/2026", linkedUseCases:[] },
        { id:5,  category:"Data Medallion Architecture", name:"Lakeflow",         sources:"20,23,46,54,58,66,96", description:"Lakeflow is Databricks' unified data engineering platform replacing fragmented multi-tool ETL stacks with three integrated pillars: Lakeflow Connect (50+ managed ingestion connectors for SaaS, databases, and event streams with automatic CDC and schema drift management), Lakeflow Pipelines (declarative Delta Live Tables engine enforcing data quality via EXPECT clauses, auto-generating Unity Catalog lineage), and Lakeflow Designer (GA April 2026 — drag-and-drop visual builder generating production DLT code). AI-first ETL is Lakeflow's key 2026 differentiator: ai_classify(), ai_extract(), and ai_summarize() are callable directly within DLT SQL transformations — enabling document parsing and entity extraction as native pipeline steps without separate ML microservices. Proven impact: Intel IT reduced ETL processing time 65% and pipeline failures 58% after migrating to Databricks. Primary displacement play against Informatica, Talend, and Azure Data Factory.", link:"deep-dive-capability-lakeflow.html", tags:"Lakeflow,Data Engineering,ETL,Pipelines,AI-First ETL,DLT", lastUpdate:"5/7/2026", linkedUseCases:[] },
        { id:6,  category:"Data Medallion Architecture", name:"Lakebase",         sources:"25,39,42,43,44,103,104,129", description:"Lakebase is Databricks' PostgreSQL-compatible serverless OLTP database (GA on Azure and AWS) — eliminating the traditional architectural boundary between operational application databases and the analytical Lakehouse. Full PostgreSQL wire compatibility means existing drivers (psycopg2, JDBC), ORMs (SQLAlchemy, Django), and tools (pgAdmin, psql) connect without modification. Bidirectional Delta Lake sync is the core innovation: application writes flow into the Lakehouse for analytics, and ML predictions flow back into Lakebase for application consumption — without any ETL pipeline between them. Lakebase Autoscaling (scale-to-zero) eliminates idle compute charges for AI workloads with spiky demand. Unity Catalog governs Lakebase tables with the same row-level security, column masking, and audit logging as Delta tables — one access control plane for both operational and analytical data. Primary GTM plays: Oracle/Postgres displacement ('your operational workloads can move to Databricks too, not just analytics') and Agent Bricks operational memory ('agents persist state and audit logs to Lakebase as Unity Catalog objects').", link:"deep-dive-capability-lakebase.html", tags:"Lakebase,OLTP,PostgreSQL,Serverless,Operational AI", lastUpdate:"5/7/2026", linkedUseCases:[] },

      // ── PARTNERSHIP ECOSYSTEM  { id, category, name, sources, description, link, tags, lastUpdate }
      partnershipEcosystem: [
        { id:1,  category:"HyperScaler / Multi-Cloud Strategy", name:"Overview",                sources:"9,17,25,28,56,92,107", description:"Databricks' multi-cloud strategy is built on the principle that the data platform should meet enterprises on the cloud they have already committed to — not force migration. Deeply integrated first-party services exist on all three hyperscalers: Azure Databricks (Microsoft flagship joint service, Lakebase GA, Azure AI Foundry integration), Databricks on AWS (largest volume deployment, Lakebase Autoscaling GA, AWS Transform mainframe modernization coalition with Accenture), and Databricks on GCP (Gemini native access via Mosaic AI, BigQuery Lakehouse Federation). Open Delta Lake/Apache Iceberg storage means data is never locked to any cloud or vendor — a decisive GTM advantage over cloud-native alternatives (Redshift, Fabric, BigQuery) where storage format creates long-term lock-in. All three hyperscalers list Databricks on their marketplaces (AWS EDP, Azure MACC, GCP CUD) — enabling purchase against existing cloud commitments and accelerating deal closure. Unity Catalog governs identically across all three clouds with a single access control model, satisfying enterprise security requirements without cloud-by-cloud permission management.", link:"deep-dive-partner-hyperscaler-overview.html", tags:"Multi-Cloud,AWS,Azure,GCP,HyperScaler Strategy,Cloud Partnerships,Marketplace", lastUpdate:"5/7/2026" },
        { id:2,  category:"HyperScaler / Multi-Cloud Strategy", name:"Microsoft Azure",         sources:"25,56,80,81,106", description:"Azure Databricks is the flagship first-party joint offering, fully managed and deeply integrated into the Azure ecosystem. The 2026 expanded partnership spans: (1) Lakebase GA on Azure — bringing PostgreSQL-compatible OLTP databases natively to the Lakehouse; (2) MLflow 3 for GenAI — enabling LLM-as-a-judge evaluation and human feedback loops; (3) Azure AI Foundry and Power Platform integrations — allowing non-technical users to consume Databricks intelligence; (4) Standard tier retirement by October 2026 — forcing all remaining Standard workspaces to upgrade to Premium for enhanced security and governance. This makes Azure Databricks the most enterprise-ready deployment path for Microsoft-centric organizations.", link:"deep-dive-partner-microsoft-azure.html", tags:"Azure,Microsoft,HyperScaler,Lakebase,MLflow,Partnership", lastUpdate:"5/7/2026" },
        { id:3,  category:"HyperScaler / Multi-Cloud Strategy", name:"AWS",                     sources:"9,18,23,104,107,129", description:"Databricks on AWS is the platform's largest-volume cloud deployment — born on Amazon S3 and now running the deepest catalog of native integrations including Lakebase Autoscaling (serverless PostgreSQL, now GA), OpenTelemetry export to AWS CloudWatch, and SageMaker model deployment from Unity Catalog. The 2026 AWS Marketplace listing makes Databricks purchasable against existing Enterprise Discount Program (EDP) commitments. Standout GTM play: Databricks joined AWS and Accenture in the AWS Transform mainframe modernization coalition — using agentic AI to extract PL/I/COBOL business logic and migrate to cloud-native services on the Databricks Lakehouse, targeting $370M in average annual technical debt per enterprise. April 2026 release added GPT-5.5 support, Lakeflow Designer (drag-and-drop pipeline builder), and Lakebase Autoscaling (scale-to-zero) on AWS.", link:"deep-dive-partner-aws.html", tags:"AWS,HyperScaler,S3,Mainframe Modernization,Lakebase,EDP,Partnership", lastUpdate:"5/7/2026" },
        { id:4,  category:"HyperScaler / Multi-Cloud Strategy", name:"Google Cloud Platform",   sources:"9,17,28,92", description:"The Databricks–GCP partnership's defining feature is model access: Google's Gemini family is available natively within the Databricks Data Intelligence Platform — enabling enterprises to run Gemini's multimodal reasoning on their own governed Delta Lake data through Unity Catalog, without data egress or separate GCP credentials. For GCP-committed enterprises, Databricks on GCP provides the governed Lakehouse layer that Google's native analytics tools lack, while making GCP's full AI ecosystem (Gemini, Vertex AI, BigQuery) available through Mosaic AI and Agent Bricks. Lakehouse Federation enables zero-copy querying of BigQuery tables within Unity Catalog's governed SQL surface. Thomas Kurian: 'This partnership empowers enterprises to build sophisticated AI agents and automate complex data workflows directly on their data — without data duplication.'", link:"deep-dive-partner-google-cloud.html", tags:"GCP,Google Cloud,Gemini,BigQuery,Multi-Cloud", lastUpdate:"5/7/2026" },
        { id:5,  category:"Complementary Technology Partners",  name:"DBT",                     sources:"20,37,66", description:"dbt (data build tool) by dbt Labs is the analytics engineering community's SQL-first transformation framework, deployed at 50,000+ companies globally. On Databricks, dbt provides Git-versioned, test-enforced, documented transformation for Silver and Gold Medallion tables — running on Databricks SQL with Photon acceleration and writing outputs directly to Unity Catalog-governed Delta tables. Analytics8, a joint dbt + Databricks certified SI, has validated this architecture at enterprise scale with Roche (life sciences) and iFit (consumer health). Key GTM insight: most enterprises with a modern data stack already use dbt — the Databricks message is preservation, not replacement: dbt investment is protected while Databricks adds ML, streaming, AI functions, and Agent Bricks on the same governed data layer. The recommended deployment pattern pairs Lakeflow for ingestion with dbt for Gold-layer SQL transformation.", link:"deep-dive-partner-dbt.html", tags:"dbt,SQL Transformation,Analytics Engineering,Modern Data Stack,Unity Catalog", lastUpdate:"5/7/2026" },
        { id:6,  category:"Complementary Technology Partners",  name:"Snowflake",               sources:"47,64,65,94,115,116,123", description:"Snowflake is the primary enterprise data platform competitor — and, increasingly, an interoperability target via Apache Iceberg and Delta UniForm. The 2026 competitive dynamic has shifted decisively: enterprises that chose Snowflake for SQL analytics simplicity now confront its limitations as AI and agent workloads become strategic priorities. Databricks wins on ML & model training (native Mosaic AI vs. limited Snowpark ML), agentic AI (Agent Bricks GA vs. Cortex AI's SQL-centric functions), real-time streaming (Structured Streaming vs. append-only Snowpipe), open storage formats (Delta Lake/Iceberg vs. proprietary FDN), and OLTP (Lakebase vs. no operational DB capability). Snowflake retains strength in SQL analytics simplicity and BI tool integrations. Key migration pattern: Delta UniForm allows Snowflake to read Delta Lake tables as Iceberg — enabling gradual migration where existing Tableau/Sigma dashboards continue working during the transition. GTM talk track: 'Do you want one platform for data, ML, streaming, and AI agents — or four?'", link:"deep-dive-partner-snowflake.html", tags:"Competitive Intel,Snowflake,Displacement,Iceberg,Migration", lastUpdate:"5/7/2026" },

      // ── CERTIFICATIONS  { id, category, name, sources, description, link, tags, lastUpdate }
      certifications: [
        { id:1, category:"Certifications & Accreditations", name:"Overview",                        sources:"6,29,67,83", description:"Databricks' credential ecosystem is organized into two tiers: Certifications (paid, proctored, time-limited, recertification every 2 years — the externally credible RFP signals) and Accreditations (free, self-paced — the onboarding baseline). Five certifications map to the primary delivery personas: Associate Developer for Apache Spark (platform-neutral Spark fundamentals, onboarding entry gate), Data Engineering Associate (Databricks-specific pipelines, DLT, Unity Catalog), Data Engineering Professional (apex cert — Advanced Spark, Structured Streaming, Delta Lake internals), Machine Learning Associate (full MLflow lifecycle, Feature Store, Model Registry), and Generative AI Engineering Associate (Agent Bricks, Vector Search & RAG, MLflow GenAI evaluation, MCP governance — the most strategically important 2026 credential). Three accreditations cover Lakehouse Platform Fundamentals, Platform Administrator, and Cloud Platform Architect. All certifications are cloud-neutral (valid across AWS, Azure, GCP) — differentiating Databricks credentials from hyperscaler-specific certs. Under the Accenture JBG, Accenture has committed to training 25,000 professionals — with certified headcount becoming a measurable, verifiable RFP differentiator as enterprise clients increasingly specify certified practitioner counts as a gating criterion for SI selection.", link:"deep-dive-cert-overview.html", tags:"Certifications,Accreditations,Credential Ecosystem,Accenture Alliance,RFP,Upskilling", lastUpdate:"5/7/2026" },
        { id:2, category:"Certifications",                  name:"Data Professionals",              sources:"6,67,83", description:"The Data Professionals certification track validates expertise across the full data lifecycle on Databricks. It spans: Analyst Associate (SQL-centric, data visualization, dashboards in Databricks SQL), Data Engineer Associate (Spark, Delta Live Tables, incremental processing, Auto Loader, Unity Catalog), and Data Engineer Professional (advanced Spark optimization, streaming, Delta Lake internals, performance tuning). As of 2026, exams are increasingly focused on Unity Catalog governance, DLT declarative pipelines, and GenAI integration — reflecting the platform's evolution. Holding these credentials signals to enterprise clients that Accenture delivery teams are certified on the most current Databricks architecture.", link:"deep-dive-cert-data-professionals.html", tags:"Certification,Data Engineering,Data Analyst,Spark,Delta Live Tables,Unity Catalog", lastUpdate:"5/7/2026" },
        { id:3, category:"Certifications",                  name:"Data Engineering Professional",   sources:"6,67,83", description:"The apex credential in the Databricks data engineering track — validating production-grade mastery across five domains: Advanced Spark (AQE, query plans, shuffle tuning, join strategies — 30%), Structured Streaming (watermarks, stateful operations, trigger modes — 25%), Delta Lake internals (transaction log, compaction, Liquid Clustering vs. ZORDER, Deletion Vectors — 20%), Advanced DLT (APPLY CHANGES CDC, SLA enforcement, Unity Catalog integration — 15%), and Production Monitoring & GenAI pipelines (10%). Format: 120 min, ~60 scenario-based questions, recertification every 2 years, Associate recommended as prerequisite. 2026 updates added Liquid Clustering, Deletion Vectors for GDPR, and Lakeflow AI functions to the exam scope. Holding this certification enables Accenture to win senior architect staffing requirements in Lakehouse RFPs and price engagements at a premium.", link:"deep-dive-cert-data-engineer-professional.html", tags:"Certification,Data Engineering,Professional,Spark,Streaming,Delta Lake,DLT", lastUpdate:"5/7/2026" },
        { id:4, category:"Certifications",                  name:"Machine Learning Associate",      sources:"6,67,83", description:"The Databricks Certified Machine Learning Associate validates foundational competence across the full model lifecycle — from exploratory analysis through production deployment — on the Databricks Lakehouse. Four exam domains: Databricks ML Core Tools & AutoML (29%), MLflow Experiment Tracking (33%), Feature Store (19%), and Model Registry & Production Deployment (19%). Format: 120 min, ~60 questions, recertification every 2 years. Key 2026 updates: Unity Catalog Model Registry replaces workspace registry (3-level catalog.schema.model namespace), GenAI evaluation via MLflow 3 LLM-as-a-judge is now testable, and serverless model serving questions added. This is the recommended primary certification for Accenture's AI/ML consulting teams — signaling to CDOs and Chief AI Officers that Accenture delivers production AI, not just platform setup — and the recommended precursor to the GenAI Engineering Associate exam.", link:"deep-dive-cert-machine-learning-associate.html", tags:"Certification,Machine Learning,MLflow,AutoML,Feature Store,Model Serving", lastUpdate:"5/7/2026" },
        { id:5, category:"Certifications",                  name:"Generative AI Engineering Associate", sources:"4,6,15,67,83,92", description:"The most strategically important 2026 Databricks credential — launched in response to the 327% surge in enterprise agentic AI adoption. Four equal exam domains (25% each): Foundation Model APIs & AI Playground (calling GPT-5.5, Claude, Llama, Gemini via Databricks APIs), Vector Search & RAG Pipelines (indexing, hybrid search, hallucination prevention), Agent Bricks & Agent SDK (Document Intelligence, multi-agent Supervisor pattern, synthetic evaluation data generation), and MLflow GenAI Evaluation & Unity AI Gateway (CLEARS framework, LLM-as-a-judge, MCP server governance). Format: 90 min, ~45 questions, ML Associate recommended prerequisite. This is the certification enterprise clients are explicitly asking for in 2026 RFPs: 'Who on the team can build and govern production AI agents on Databricks?' No Snowflake equivalent exists — Databricks' GenAI Engineering Associate is the definitive credential for the agentic AI era.", link:"deep-dive-cert-genai-engineering-associate.html", tags:"Certification,GenAI,Agent Bricks,Vector Search,LLMOps,Unity AI Gateway", lastUpdate:"5/7/2026" },
        { id:6, category:"Certifications",                  name:"Associate Developer Apache Spark",sources:"6,67,83", description:"The Databricks Certified Associate Developer for Apache Spark is the platform-neutral foundational Spark developer credential — validating core PySpark and Scala Spark competency (DataFrames, Spark SQL, performance optimization) applicable across Databricks, AWS EMR, Google Dataproc, and any other Spark runtime. Three exam domains: Spark Architecture & DataFrame API (40% — execution model, lazy evaluation, transformations/actions, file format I/O), Spark SQL & Built-in Functions (35% — SparkSession, window functions, UDFs, aggregation patterns), and Spark Performance & Optimization (25% — partitioning, broadcast joins, caching, Catalyst optimizer). Format: 120 min, ~60 questions, available in Python and Scala. For Accenture's 25,000-professional training commitment, this cert functions as the 'entry gate' for the data engineering track — ensuring practitioners pursuing the DE Associate path arrive with verified distributed computing fundamentals. Recommended for software engineers on Databricks delivery teams contributing to pipeline code who need Spark competency without the full Data Engineering track.", link:"deep-dive-cert-spark-developer.html", tags:"Certification,Apache Spark,PySpark,DataFrame API,Developer", lastUpdate:"5/7/2026" },

      clientUseCases: [
        { id:1,  category:"Agentic Reinvention", name:"Albertsons",       sources:"12,15,45,63,124", description:"Albertsons Companies (2,270+ stores, $79B revenue, 20 banner brands including Safeway, Vons, Jewel-Osco, and Shaw's) is the Accenture JBG's flagship launch proof point — the most prominent joint client in Databricks history. Accenture and Databricks are implementing a 'merchant twin' agentic AI capability built on Agent Bricks: the agent autonomously monitors competitive pricing, promotional performance, and inventory signals across all banner brands — generating prioritized pricing and promotional calendar recommendations for merchant approval. Delta Lake unifies fragmented POS, loyalty, supply chain, and competitor data into a Medallion Lakehouse; Mosaic AI trains promotional response models; Unity Catalog enforces pricing governance. Business impact: merchants compress weeks of manual pricing analysis to hours, achieve consistent promotional optimization across banners, and improve margin through AI-assisted decisions. The merchant twin demonstrates the core JBG thesis — agentic AI shifts economic value from productivity to growth — at a scale every CPG retailer immediately understands. GTM entry point for any grocery chain, pharmacy, drug retailer, or mass merchandiser.", link:"deep-dive-client-albertsons.html", tags:"Grocery Retail,Agentic AI,Pricing Intelligence,Merchandising,Accenture JBG,Agent Bricks", lastUpdate:"5/7/2026" },
        { id:2,  category:"Agentic Reinvention", name:"Adidas",           sources:"4,14,15,45,63", description:"Adidas leverages the Databricks Data Intelligence Platform to unify fragmented data across its global retail, supply chain, and digital channels. By consolidating 160+ markets' worth of sales, inventory, and customer interaction data onto a single Lakehouse, Adidas' data science teams build demand forecasting, personalization, and sustainability reporting models at enterprise scale. The Mosaic AI suite enables Adidas to run ML experimentation and push models to production faster, while Unity Catalog ensures consistent governance across its multi-cloud deployments. Agent Bricks is being evaluated for autonomous merchandising recommendations and real-time stock optimization.", link:"deep-dive-client-adidas.html", tags:"Retail,Demand Forecasting,Personalization,Lakehouse,Mosaic AI,Agent Bricks", lastUpdate:"5/7/2026" },
        { id:3,  category:"Agentic Reinvention", name:"Arize",            sources:"15,16,57,92,98", description:"Arize AI integrates with Databricks' Managed MLflow and Unity Catalog to provide enterprise-grade LLMOps observability for production AI models and autonomous agents. As a Built-On Databricks ISV, Arize consumes Agent Bricks and MLflow traces via OpenTelemetry to monitor token usage, latency, hallucination rates, and retrieval quality at scale — without proprietary pipelines. Key use cases: production LLM drift detection feeding problematic examples back into Delta Lake for targeted retraining via Lakeflow; multi-agent trace analysis tracking each reasoning step and tool call for correctness and cost; Unity Catalog integration for training vs. serving data distribution monitoring; and LLM-as-a-judge evaluation pipelines creating automated quality gates before model promotion. Architecture: Agent Bricks traces → Unity AI Gateway (OpenTelemetry) → Arize → Delta Lake → Lakeflow retraining — a closed-loop self-healing LLMOps system. Arize is a strong reference for any client building production agentic AI who needs to answer: 'How do we know the agents are working correctly?'", link:"deep-dive-client-arize.html", tags:"AI Observability,LLMOps,MLflow,Agent Monitoring,Tech,ISV,Agentic", lastUpdate:"5/7/2026" },
        { id:4,  category:"Agentic Reinvention", name:"7-Eleven",         sources:"4,14,15,45,63", description:"7-Eleven (83,000+ stores, 19 countries) partnered with Databricks to consolidate fragmented store-level and regional data onto a unified Lakehouse — enabling store-SKU-level demand forecasts at daily granularity previously impossible with traditional data warehousing. Four core use cases: (1) Hyper-Local Demand Forecasting — Delta Lake ingests hourly transaction data enriched with weather, events, and competitor signals via Lakeflow; Mosaic AI generates store-SKU forecasts identifying zip-code-level over-stock needs; (2) 7REWARDS Loyalty Intelligence — billions of annual transaction events consolidated into unified customer profiles; Vector Search powers real-time next-best-offer recommendations in the mobile app; (3) Autonomous Replenishment — Agent Bricks orchestrates forecast → gap analysis → supplier lookup → order generation, flagging exceptions for human review; (4) Dynamic Assortment — category managers query store performance in natural language via Genie, compressing weeks of manual analysis to hours. Agentic roadmap includes autonomous promotional planning, franchise operations anomaly detection, and real-time pricing optimization. The prototypical proof point for any large-format retailer, convenience chain, or QSR operator.", link:"deep-dive-client-7eleven.html", tags:"Convenience Retail,Demand Forecasting,Loyalty,Supply Chain,Agentic", lastUpdate:"5/7/2026" },
        { id:5,  category:"Agentic Reinvention", name:"Providence Health", sources:"4,12,63,69,119", description:"Providence Health & Services (51 hospitals, 5M+ patients, Western US) leverages the Databricks Data Intelligence Platform to unify clinical, operational, and financial data across a HIPAA-regulated enterprise — the hardest data governance scenario in any industry. Four core use cases: (1) Population Health Analytics — system-wide risk stratification models identify high-risk patients for 30-day readmission across all 51 hospitals using Medallion Architecture Gold tables; (2) HIPAA-Compliant AI Governance — Unity Catalog enforces row-level security on patient data at query time with automated audit logs satisfying HIPAA access logging requirements; (3) Clinical Operations Optimization — Lakeflow pipelines process real-time ADT events from Epic for near-real-time bed utilization dashboards; (4) Patient Outcomes Platform — Feature Store ensures point-in-time correct feature retrieval preventing data leakage in clinical ML models. Agentic roadmap: Clinical Decision Support Agent, Care Coordination Agent, and Revenue Cycle Optimization Agent. The definitive Databricks healthcare proof point for any health system, payer, or life sciences client asking how to build AI on regulated patient data.", link:"deep-dive-client-providence-health.html", tags:"Healthcare,Clinical Analytics,HIPAA,Population Health,Agentic AI", lastUpdate:"5/7/2026" },
        { id:6,  category:"Agentic Reinvention", name:"Prada Group",      sources:"4,12,26,63,124", description:"Prada Group (650+ directly operated boutiques in 70+ countries, brands: Prada, Miu Miu, Church's, Car Shoe) leverages the Databricks Data Intelligence Platform to unify global client intelligence, supply chain data, and EU CSRD sustainability reporting. Four core use cases: (1) Ultra-Luxury Personalization — Delta Lake consolidates in-store clienteling, e-commerce, and CRM into unified ultra-high-net-worth client profiles; Mosaic AI computes purchase propensity and preferred communication channels; Vector Search powers semantic product catalog search for stylist assistance; (2) Global Limited-Edition Planning — Lakeflow integrates manufacturing and inventory data for demand-aware production planning where over-production destroys brand exclusivity; (3) CSRD Sustainability Reporting — Unity Catalog governs scope 1/2/3 emissions data with Delta time travel for historical baselines and lineage tracing satisfying EU auditability requirements; (4) Cultural Trend Detection — Lakeflow ingests social media signals; Foundation Model APIs perform semantic analysis of emerging color stories and material preferences. Agentic roadmap: Autonomous Replenishment Agent, Personalized Digital Styling Agent, and CSRD Automated Reporting Agent. Prada is the prototypical luxury fashion proof point opening conversations with LVMH, Kering, Richemont, and Hermès.", link:"deep-dive-client-prada.html", tags:"Luxury Fashion,Client Intelligence,Supply Chain,ESG Reporting,Personalization", lastUpdate:"5/7/2026" },

    const ExpandedGTM = ({ row }) => (

    /* ═══════════════════════════════════════════════
       SOURCE REPO — HELPERS
    ═══════════════════════════════════════════════ */
    const inferType = title => {
      const t = title.toLowerCase();
      if (/e-?book|ebook/.test(t))                                              return 'E-book';
      if (/\breport\b|state of\b|survey|annual\b|index\b/.test(t))             return 'Report';
      if (/\bpaper\b|research\b|whitepaper/.test(t))                           return 'Paper';
      if (/\bguide\b|how.?to|tutorial|questions to prepare|comprehensive|cheat sheet/.test(t)) return 'Guide';
      if (/\bblog\b/.test(t))                                                   return 'Blog';
      if (/\bdoc(umentation)?\b/.test(t))                                       return 'Docs';
      if (/podcast|webinar|video/.test(t))                                      return 'Media';
      return 'Article';
    };

    const inferTopics = title => {
      const t = title.toLowerCase();
      const topics = [];
      if (/\bai\b|artificial intell|machine learn|llm\b|gpt|genai|generative|agentic|agent\b/.test(t)) topics.push('AI & ML');
      if (/data engineer|medallion|delta lake|lakehouse|etl\b|pipeline|apache spark|unity catalog/.test(t)) topics.push('Data Engineering');
      if (/analytic|bi\b|business intelligence|visualization|reporting/.test(t)) topics.push('Analytics');
      if (/cloud|aws\b|azure|google cloud|gcp\b/.test(t))                      topics.push('Cloud');
      if (/partner|ecosystem|alliance|isv\b/.test(t))                          topics.push('Partnership');
      if (/certif/.test(t))                                                     topics.push('Certification');
      if (/financial|banking|insurance|fintech|capital market/.test(t))        topics.push('Financial Services');
      if (/securi|governance|compliance|privacy|regulat/.test(t))              topics.push('Governance');
      if (/accenture/.test(t))                                                  topics.push('Accenture');
      if (!topics.length) topics.push('General');
      return [...new Set(topics)];
    };

    const parsePublisher = title => {
      const match = title.match(/\s+[-|]\s+([^-|]+)$/);
      return match ? match[1].trim() : '';
    };

    const parseCleanTitle = title => {
      return title.replace(/\s+[-|]\s+[^-|]+$/, '').trim() || title;
    };

    /* ═══════════════════════════════════════════════
       SOURCE MODAL
    ═══════════════════════════════════════════════ */
    const SourceModal = ({ source, index, onClose }) => {
      const type       = inferType(source.title);
      const topics     = inferTopics(source.title);
      const publisher  = parsePublisher(source.title);
      const cleanTitle = parseCleanTitle(source.title);

      React.useEffect(() => {
        const fn = e => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', fn);
        return () => window.removeEventListener('keydown', fn);
      }, []);

      return (
        <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
          <div className="modal-box" role="dialog" aria-modal="true">
            <div className="modal-header">
              <div className="modal-title">{cleanTitle}</div>
              <button className="modal-close" onClick={onClose} aria-label="Close">
                <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" strokeWidth="2">
                  <path d="M1 1L10 10M10 1L1 10" strokeLinecap="round"/>
                </svg>

            </div>
            <div className="modal-body">
              {/* Meta row */}

                <span className="src-type-badge">{type}</span>

              </div>
              {/* Topics */}

                {topics.map(tp => (
                  <span key={tp} className="tag" style={{background:'var(--primary-pale)',color:'var(--primary)',border:'none'}}>{tp}</span>
                ))}
              </div>
              {/* Key Take-Away */}
              <div>
                <div className="modal-sec-lbl">Key Take-Away</div>
                {source.keyTakeaway && source.keyTakeaway !== 'Databricks' && source.keyTakeaway !== 'Thoughtworks'
                  ? <div className="modal-text">{source.keyTakeaway}</div>
                  : <div className="modal-empty">No key take-away added yet — update the "Main Thesis / Most Important Points" column in Databricks_GTM.xlsx.</div>
                }
              </div>
              {/* Relevance */}
              <div>
                <div className="modal-sec-lbl">Relevance to Databricks GTM</div>
                {source.relevance
                  ? <div className="modal-text">{source.relevance}</div>
                  : <div className="modal-empty">No relevance note yet — update the "Relevance for our GTM" column in Databricks_GTM.xlsx.</div>
                }
              </div>
            </div>
            {source.link && (
              <div className="modal-footer">
                <a href={source.link} target="_blank" rel="noopener noreferrer" className="btn-nlm">
                  Visit website&nbsp;<IcoExternal />
                </a>

    /* ═══════════════════════════════════════════════
       SOURCES VIEW — academic repository
    ═══════════════════════════════════════════════ */
    const SourcesView = ({ rows, notebookLMLink }) => {
      const [view,        setView]        = useState('cards');
      const [typeFilter,  setTypeFilter]  = useState('All');
      const [topicFilter, setTopicFilter] = useState('All');
      const [search,      setSearch]      = useState('');
      const [modal,       setModal]       = useState(null);

      const annotated = useMemo(() => rows.map(r => ({
        ...r,
        _type:       inferType(r.title),
        _topics:     inferTopics(r.title),
        _publisher:  parsePublisher(r.title),
        _cleanTitle: parseCleanTitle(r.title),
      })), [rows]);

      const presentTypes  = useMemo(() => [...new Set(annotated.map(r => r._type))].sort(),               [annotated]);
      const presentTopics = useMemo(() => [...new Set(annotated.flatMap(r => r._topics))].sort(),          [annotated]);

      const filtered = useMemo(() => {
        let r = annotated;
        if (typeFilter  !== 'All') r = r.filter(row => row._type === typeFilter);
        if (topicFilter !== 'All') r = r.filter(row => row._topics.includes(topicFilter));
        if (search.trim()) r = r.filter(row => row.title.toLowerCase().includes(search.toLowerCase()));
        return r;
      }, [annotated, typeFilter, topicFilter, search]);

      if (!rows.length) return (
        <div className="empty-state">
          <div className="empty-title">No sources yet</div>
          <div className="empty-body">Add entries to the Sources tab in Databricks_GTM.xlsx.</div>
        </div>
      );

      return (
        <div className="src-layout">

          {/* ── SIDEBAR ── */}
          <div className="src-sidebar">
            {/* Search */}
            <div className="src-sidebar-section">
              <div className="search-wrap">
                <span className="search-icon"><IcoSearch /></span>
                <input
                  type="text" placeholder="Search sources…"
                  value={search} onChange={e => setSearch(e.target.value)}
                />
              </div>
              <span className="src-count">{filtered.length} of {rows.length} sources</span>
            </div>

            {/* Type filter */}
            <div className="src-sidebar-section">
              <div className="src-sidebar-label">Type</div>
              <div className="pills">
                <button className={`pill${typeFilter==='All'?' active':''}`} onClick={() => setTypeFilter('All')}>
                  All <span className="pill-cnt">{annotated.length}</span>
                </button>
                {presentTypes.map(tp => (
                  <button key={tp} className={`pill${typeFilter===tp?' active':''}`} onClick={() => setTypeFilter(tp)}>
                    {tp} <span className="pill-cnt">{annotated.filter(r=>r._type===tp).length}</span>
                  </button>
                ))}
              </div>
            </div>

            {/* Topic filter */}
            <div className="src-sidebar-section">
              <div className="src-sidebar-label">Topic</div>
              <div className="pills">
                <button className={`pill${topicFilter==='All'?' active':''}`} onClick={() => setTopicFilter('All')}>
                  All
                </button>
                {presentTopics.map(tp => (
                  <button key={tp} className={`pill${topicFilter===tp?' active':''}`} onClick={() => setTopicFilter(tp)}>
                    {tp} <span className="pill-cnt">{annotated.filter(r=>r._topics.includes(tp)).length}</span>
                  </button>
                ))}
              </div>
            </div>
          </div>

          {/* ── RESULTS ── */}
          <div className="src-results">
            {/* Results bar */}
            <div className="src-results-bar">
              <span className="src-count">{filtered.length} of {rows.length} sources</span>
              <div className="view-toggle">
                <button className={`view-toggle-btn${view==='cards'?' active':''}`} onClick={() => setView('cards')}>Cards</button>
                <button className={`view-toggle-btn${view==='table'?' active':''}`} onClick={() => setView('table')}>Table</button>
              </div>
            </div>

            {/* NotebookLM banner */}
            {notebookLMLink && (
              <div style={{padding:'12px 16px',borderRadius:'var(--r-sm)',border:'1px solid var(--border)',display:'flex',alignItems:'center',gap:14,background:'var(--primary-tint)',marginBottom:14}}>
                <span style={{fontSize:13,color:'var(--t2)',fontWeight:500,flex:1}}>
                  All {rows.length} sources indexed in NotebookLM for AI-powered research
                </span>
                <a href={notebookLMLink} target="_blank" rel="noopener noreferrer" className="btn-nlm" style={{fontSize:11.5,padding:'7px 16px'}}>
                  <IcoNotebook />&nbsp;Open NotebookLM
                </a>
              </div>
            )}

            {/* No results */}
            {filtered.length === 0 && (
              <div className="empty-state">
                <div className="empty-title">No matches</div>
                <div className="empty-body">Try adjusting your filters or search term.</div>
              </div>
            )}

            {/* ── CARD VIEW ── */}
            {view === 'cards' && filtered.length > 0 && (
              <div className="src-card-grid">
                {filtered.map((row, i) => (
                  <div key={row.id} className="src-card" onClick={() => setModal({ source: row, index: i })}>
                    <div className="src-card-top">
                      <span className="src-type-badge">{row._type}</span>
                      <span className="src-card-num">#{String(i+1).padStart(2,'0')}</span>
                    </div>
                    <div className="src-card-title">{row._cleanTitle}</div>
                    {(row.author || row._publisher) && (
                      <div className="src-publisher">{row.author || row._publisher}</div>

                      {row._topics.map(tp => (
                        <span key={tp} className="tag" style={{background:'var(--primary-pale)',color:'var(--primary)',border:'none',fontSize:10}}>{tp}</span>
                      ))}

            {/* ── TABLE VIEW ── */}

                  <div
                    key={row.id} className="source-item"
                    style={{cursor:'pointer'}}
                    onClick={() => setModal({ source: row, index: i })}

                    <span className="source-num">{String(i+1).padStart(2,'0')}</span>

                      ))}

                    {row.link && (

                        <IcoLink />&nbsp;Visit website

              </div>

          </div>

          {/* Modal */}
          {modal && (
            <SourceModal source={modal.source} index={modal.index} onClose={() => setModal(null)} />
          )}
        </div>
      );
    };

    /* ═══════════════════════════════════════════════
       TAB CONTENT (orchestrator)
    ═══════════════════════════════════════════════ */
    const TabContent = ({ tab, rows, allUseCases }) => {
      const [expanded,   setExpanded]   = useState(null);
      const [search,     setSearch]     = useState('');
      const [activeCat,  setActiveCat]  = useState('All');

      const toggle = id => setExpanded(p => p===id ? null : id);

      const isStandard = !['sources','gtmPipeline'].includes(tab.id);
      const isGTM      = tab.id === 'gtmPipeline';
      const isSources  = tab.id === 'sources';

      // GTM filters by "area"; all standard tabs filter by "category"
      const filterKey  = isGTM ? 'area' : 'category';
      const categories = uniq(rows, filterKey);

      const counts = useMemo(() => {
        const c = { __total: rows.length };
        categories.forEach(cat => { c[cat] = rows.filter(r => r[filterKey]===cat).length; });
        return c;
      }, [rows, categories]);

      const filtered = useMemo(() => {
        let r = rows;
        if (activeCat !== 'All') r = r.filter(row => row[filterKey] === activeCat);
        if (search.trim()) r = r.filter(row => matchQ(row, search));
        return r;
      }, [rows, activeCat, search]);

      return (
        <div>
          {/* Infographic banner */}
          {tab.image && (
            <div className="img-banner">
              <img src={tab.image} alt={tab.label} />
            </div>
          )}

          {/* Filter bar — search + pills for all non-sources tabs */}
          {(isStandard || isGTM) && rows.length > 0 && (
            <div className="filter-bar">
              <div className="search-wrap">
                <span className="search-icon"><IcoSearch /></span>
                <input
                  type="text" placeholder="Search…"
                  value={search} onChange={e => setSearch(e.target.value)}
                />
              </div>
              {categories.length > 0 && (
                <Pills categories={categories} active={activeCat} counts={counts} onChange={setActiveCat} />
              )}
            </div>
          )}

          {/* Table / list */}
          <div className="table-wrap">
            {isSources  && <SourcesView rows={rows} notebookLMLink={null} />}
            {isGTM      && <GTMTable rows={filtered} expandedId={expanded} onToggle={toggle} />}
            {isStandard && <StandardTable rows={filtered} expandedId={expanded} onToggle={toggle} allUseCases={allUseCases} />}
          </div>
        </div>
      );
    };

    /* ═══════════════════════════════════════════════
       APP
    ═══════════════════════════════════════════════ */
    const App = () => {
      const [activeTab, setActiveTab] = useState('sources');
      const tab = TABS.find(t => t.id === activeTab);

      const tabRows = {
        sources:              DATA.sources,
        background:           DATA.background,
        coreCapabilities:     DATA.coreCapabilities,
        partnershipEcosystem: DATA.partnershipEcosystem,
        certifications:       DATA.certifications,
        clientUseCases:       DATA.clientUseCases,
        gtmPipeline:          DATA.gtmPipeline,
      };

      const today = new Date().toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});

      return (
        <div>
          {/* Navbar */}
          <nav className="nav">
            <div className="nav-left">
              <img src="images/logo.png" alt="Accenture" className="nav-logo-acc" />
              <span className="nav-sep" />
              <img src="images/databricks-logo.png" alt="Databricks" className="nav-logo-dbr" />
              <span className="nav-sep" />
              <div className="nav-title-wrap">
                <span className="nav-title">Databricks GTM</span>
                <span className="nav-sub">Strategic Intelligence Repository</span>
              </div>
              <span className="nav-badge">Internal</span>
            </div>
            <div className="nav-right">Updated {today}</div>
          </nav>

          {/* Tab bar */}
          <div className="tab-bar" role="tablist">
            {TABS.map(t => (
              <button
                key={t.id}
                role="tab"
                aria-selected={activeTab===t.id}
                className={`tab-btn${activeTab===t.id?' active':''}`}
                onClick={() => setActiveTab(t.id)}
              >
                {t.label}
              </button>
            ))}
          </div>

          {/* Content */}
          <main className="main">
            <TabContent
              key={activeTab}
              tab={tab}
              rows={tabRows[activeTab]}
              allUseCases={DATA.clientUseCases}
            />
          </main>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
